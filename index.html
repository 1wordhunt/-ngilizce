<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; --gold: #f1c40f; --dark: #0a0a0a; --purple: #9b59b6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }
        
        /* LOGO STİLİ */
        .game-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--green); margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }

        .big-card { background: #151515; border-radius: 25px; width: 95%; max-width: 450px; padding: 25px; text-align: center; border: 1px solid #222; margin: auto; position: relative; z-index: 5; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; color: #fff; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 13px; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        
        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); padding: 20px; }
        .visible { display: flex !important; }

        .ghost-overlay { position: fixed; inset: 0; background: rgba(255, 0, 0, 0.4); z-index: 9998; display: none; pointer-events: none; }
        .js-overlay { position: fixed; inset: 0; background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD1n/3o7TKv9QWGb7y3jPj2/giphy.gif') center/cover; z-index: 9999; display: none; opacity: 0.7; pointer-events: none; mix-blend-mode: color-dodge; }
        
        .shake { animation: shake 0.2s ease-in-out infinite; }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(-10px,5px); } 50% { transform: translate(10px,-5px); } 100% { transform: translate(0,0); } }

        .list-box { background: #000; border-radius: 15px; padding: 15px; max-height: 280px; overflow-y: auto; width: 100%; border: 1px solid #222; }
        .list-item { padding: 12px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; font-size: 13px; font-family: 'Orbitron'; }
        
        #chat-flow { height: 180px; overflow-y: auto; background: #050505; border-radius: 10px; padding: 10px; text-align: left; margin-bottom: 10px; border: 1px solid #222; font-size: 12px; }
        .dev-tag { background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="js-screen" class="js-overlay"></div>
<div id="ghost-screen" class="ghost-overlay"></div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

<div id="scr-login" style="display: flex; height: 100vh; align-items: center;">
    <div class="big-card">
        <img src="https://i.ibb.co/2HLfyhf/MG-20260426-WA0015.jpg" class="game-logo" alt="Logo">
        <h1 style="font-family:'Orbitron'; color: var(--green); margin-bottom: 20px;">WORD HUNT</h1>
        <input type="text" id="username" placeholder="KULLANICI ADI" style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:12px; text-align:center;">
        <input type="password" id="password" placeholder="ŞİFRE" style="width:100%; padding:15px; margin-bottom:20px; background:#111; border:1px solid #333; color:#fff; border-radius:12px; text-align:center;">
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.auth()">GİRİŞ YAP</button>
    </div>
</div>

<div id="main-menu" class="overlay" style="background:none;">
    <div class="big-card">
        <img src="https://i.ibb.co/2HLfyhf/MG-20260426-WA0015.jpg" class="game-logo" style="width:80px; height:80px;" alt="Logo">
        <div id="menu-header" style="margin-bottom: 20px;"></div>
        <button class="btn" style="background: var(--red);" onclick="sys.openModal('modal-diff')">🎮 OYNA</button>
        <button class="btn" style="background: var(--blue);" onclick="sys.openModal('modal-diary')">📖 GÜNLÜK</button>
        <button class="btn" style="background: var(--purple);" onclick="sys.openModal('modal-profile')">👤 PROFİL</button>
        <button class="btn" style="background: var(--gold); color:#000;" onclick="sys.openModal('modal-rank')">🏆 SIRALAMA</button>
        <button class="btn" style="background: var(--orange);" onclick="sys.openModal('modal-chat')">💬 CHAT</button>
        <button class="btn" style="background: #333; margin-top: 15px;" onclick="location.reload()">ÇIKIŞ</button>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div id="game-card" class="big-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <div id="hearts" style="color:var(--red); font-size:20px;">❤️❤️❤️</div>
            <div id="timer" style="font-family:'Orbitron'; color:var(--gold); font-size:20px;">30</div>
        </div>
        <div id="word-target" style="font-size: 38px; margin: 15px 0; font-weight: 900;">...</div>
        <input type="text" id="game-inp" placeholder="Cevap..." autocomplete="off" style="width:100%; padding:18px; background:#000; border:2px solid #333; color:#fff; border-radius:15px; text-align:center; font-size:22px; margin-bottom:15px;">
        <button class="btn" style="background: var(--green); color:#000;" onclick="sys.check()">GÖNDER</button>
        <div style="font-weight:800; color:var(--gold);">SKOR: <b id="score-val">0</b></div>
    </div>
</div>

<div id="modal-diff" class="overlay"><div class="big-card"><h2>ZORLUK</h2><button class="btn" style="background:var(--green)" onclick="sys.start('easy')">KOLAY</button><button class="btn" style="background:var(--orange)" onclick="sys.start('medium')">ORTA</button><button class="btn" style="background:var(--red)" onclick="sys.start('hard')">ZOR</button><button class="btn" style="background:#333" onclick="sys.closeAll()">GERİ</button></div></div>
<div id="modal-diary" class="overlay"><div class="big-card"><h2>📖 GÜNLÜK</h2><div style="display:flex; gap:5px; margin-bottom:10px;"><button class="btn" style="background:var(--green); font-size:10px;" onclick="sys.loadDiary('easy')">KOLAY</button><button class="btn" style="background:var(--orange); font-size:10px;" onclick="sys.loadDiary('medium')">ORTA</button><button class="btn" style="background:var(--red); font-size:10px;" onclick="sys.loadDiary('hard')">ZOR</button></div><div id="diary-list" class="list-box"></div><button class="btn" style="background:#333; margin-top:10px;" onclick="sys.closeAll()">KAPAT</button></div></div>
<div id="modal-profile" class="overlay"><div class="big-card"><h2>👤 PROFİL</h2><div id="profile-box" class="list-box" style="text-align:left;"></div><button class="btn" style="background:#333; margin-top:15px;" onclick="sys.closeAll()">KAPAT</button></div></div>
<div id="modal-rank" class="overlay"><div class="big-card"><h2>🏆 DÜNYA SIRALAMASI</h2><div id="rank-list" class="list-box"></div><button class="btn" style="background:#333; margin-top:15px;" onclick="sys.closeAll()">KAPAT</button></div></div>
<div id="modal-chat" class="overlay"><div class="big-card"><h2>💬 GLOBAL CHAT</h2><div id="chat-flow"></div><input type="text" id="chat-inp" placeholder="Mesaj..." style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:10px; margin-bottom:10px;"><button class="btn" style="background:var(--blue)" onclick="sys.sendChat()">GÖNDER</button><button class="btn" style="background:#333" onclick="sys.closeAll()">KAPAT</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-rMw-MeHpSq0Zh4RX52Ct6DTXec9xCUM",
        authDomain: "ing-9dee1.firebaseapp.com",
        databaseURL: "https://ing-9dee1-default-rtdb.firebaseio.com",
        projectId: "ing-9dee1",
        storageBucket: "ing-9dee1.firebasestorage.app",
        messagingSenderId: "701609740939",
        appId: "1:701609740939:web:d13eded0401d2305da228e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const TR = {"time":"Zaman","year":"Yıl","people":"İnsan","way":"Yol","day":"Gün","man":"Adam","thing":"Şey","woman":"Kadın","life":"Hayat","child":"Çocuk","world":"Dünya","school":"Okul","state":"Devlet","family":"Aile","student":"Öğrenci","group":"Grup","country":"Ülke","problem":"Sorun","hand":"El","part":"Parça","place":"Yer","case":"Durum","week":"Hafta","company":"Şirket","system":"Sistem","word":"Kelime","work":"İş","use":"Kullanım","make":"Yapmak","take":"Almak","give":"Vermek","come":"Gelmek","look":"Bakmak","want":"İstemek","find":"Bulmak","tell":"Söylemek","ask":"Sormak","try":"Denemek","need":"İhtiyaç","feel":"Hissetmek","become":"Olmak","leave":"Ayrılmak","call":"Aramak","keep":"Tutmak","start":"Başlamak","seem":"Görünmek","help":"Yardım","talk":"Konuşmak","turn":"Dönmek","begin":"Başlamak","show":"Göstermek","good":"İyi","new":"Yeni","first":"İlk","last":"Son","long":"Uzun","great":"Harika","little":"Küçük","own":"Kendi","other":"Diğer","old":"Eski","right":"Doğru","big":"Büyük","high":"Yüksek","different":"Farklı","small":"Küçük","large":"Geniş","next":"Sıradaki","early":"Erken","young":"Genç","important":"Önemli","few":"Az","public":"Halk","bad":"Kötü","same":"Aynı","able":"Yetenekli","very":"Çok","often":"Sık sık","really":"Gerçekten","quickly":"Hızlıca","slowly":"Yavaşça","well":"İyi","always":"Her zaman","sometimes":"Bazen","usually":"Genellikle","together":"Birlikte","already":"Zaten","almost":"Neredeyse","especially":"Özellikle","probably":"Muhtemelen","finally":"Sonunda","easily":"Kolayca","recently":"Son zamanlarda","immediately":"Hemen","nearly":"Yaklaşık","currently":"Şu anda","clearly":"Açıkça","simply":"Basitçe","exactly":"Tam olarak","strongly":"Güçlüce"};
    const WORDS_LIST = Object.keys(TR);
    const WORDS = {
        easy: WORDS_LIST.slice(0,35).map(e => ({e, t: TR[e]})),
        medium: WORDS_LIST.slice(35,70).map(e => ({e, t: TR[e]})),
        hard: WORDS_LIST.slice(70,100).map(e => ({e, t: TR[e]}))
    };

    const sys = {
        u:"", r:0, knows:{}, time:30, pts:0, hearts:3, curW:null, curD:'easy', timer:null, isDev:false,

        auth: () => {
            const n = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!n) return;
            db.ref('users/'+n).once('value', s => {
                const u = s.val();
                if(u && u.pass !== p) return alert("Hatalı!");
                sys.u = n; sys.r = u?.record || 0; sys.knows = u?.knows || {};
                sys.isDev = (n.toLowerCase() === "burak");
                if(!u) db.ref('users/'+n).set({pass:p, record:0});
                document.getElementById('scr-login').style.display='none';
                document.getElementById('main-menu').classList.add('visible');
                sys.upUI(); sys.listenChat();
            });
        },

        upUI: () => {
            const rank = sys.getRank(sys.r);
            document.getElementById('menu-header').innerHTML = `<h2 style="font-family:'Orbitron'">${sys.u.toUpperCase()} ${sys.isDev?'<span class="dev-tag">DEV</span>':''}</h2><p style="color:${rank.c}; font-size:10px;">${rank.n}</p>`;
            document.getElementById('profile-box').innerHTML = `<p>İSİM: ${sys.u.toUpperCase()}</p><p>REKOR: ${sys.r}</p><p>RÜTBE: <span style="color:${rank.c}">${rank.n}</span></p>`;
        },

        getRank: (s) => {
            if(s >= 2000) return {n:"ELİT KIRMIZI", c:"var(--red)"};
            if(s >= 1000) return {n:"ELMAS MAVİ", c:"var(--blue)"};
            if(s >= 500) return {n:"ALTIN SARI", c:"var(--gold)"};
            if(s >= 200) return {n:"DEMİR GRİ", c:"#aaa"};
            return {n:"ÇAYLAK BRONZ", c:"#cd7f32"};
        },

        start: (d) => {
            sys.closeAll(); sys.pts = 0; sys.time = 30; sys.hearts = 3; sys.curD = d;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('hearts').innerText = "❤️❤️❤️";
            document.getElementById('scr-game').classList.add('visible');
            sys.next();
            sys.timer = setInterval(() => {
                sys.time--; document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) sys.end("ZAMAN BİTTİ!");
            }, 1000);
        },

        next: () => {
            const p = WORDS[sys.curD];
            sys.curW = p[Math.floor(Math.random()*p.length)];
            document.getElementById('word-target').innerText = sys.curW.t;
            document.getElementById('game-inp').value = ""; document.getElementById('game-inp').focus();
        },

        check: () => {
            const v = document.getElementById('game-inp').value.trim().toLowerCase();
            if(v === sys.curW.e) {
                sys.pts += 50; sys.time += 2;
                document.getElementById('score-val').innerText = sys.pts;
                document.getElementById('snd-correct').play();
                confetti({particleCount: 60, spread: 70, origin: { y: 0.8 }});
                sys.knows[sys.curW.e] = true;
                db.ref('users/'+sys.u+'/knows/'+sys.curW.e).set(true);
                sys.next();
            } else {
                sys.hearts--;
                document.getElementById('hearts').innerText = "❤️".repeat(sys.hearts);
                document.getElementById('snd-wrong').play();
                document.getElementById('ghost-screen').style.display='block';
                document.getElementById('js-screen').style.display='block';
                document.getElementById('game-card').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('ghost-screen').style.display='none';
                    document.getElementById('js-screen').style.display='none';
                    document.getElementById('game-card').classList.remove('shake');
                }, 500);
                if(sys.hearts <= 0) sys.end("ELENDİN!"); else sys.next();
            }
        },

        showRank: () => {
            const list = document.getElementById('rank-list');
            list.innerHTML = "Yükleniyor...";
            db.ref('users').once('value', s => {
                list.innerHTML = "";
                let arr = [];
                s.forEach(u => {
                    arr.push({n: u.key, r: u.val().record || 0});
                });
                arr.sort((a,b) => b.r - a.r);
                arr.slice(0,10).forEach((u, i) => {
                    list.innerHTML += `<div class="list-item"><span>#${i+1} ${u.n.toUpperCase()}</span><b>${u.r} PT</b></div>`;
                });
            });
        },

        loadDiary: (diff) => {
            const list = document.getElementById('diary-list'); list.innerHTML = "";
            WORDS[diff].forEach(w => {
                const k = sys.knows[w.e] ? '<b style="color:var(--green)">✓</b>' : '';
                list.innerHTML += `<div class="list-item"><span>${w.e}</span>${k}</div>`;
            });
        },

        sendChat: () => {
            const m = document.getElementById('chat-inp').value;
            if(!m) return;
            db.ref('chat').push({u: sys.u, m: m, d: sys.isDev});
            document.getElementById('chat-inp').value = "";
        },

        listenChat: () => {
            db.ref('chat').limitToLast(15).on('value', snap => {
                const flow = document.getElementById('chat-flow'); flow.innerHTML = "";
                snap.forEach(c => {
                    const v = c.val();
                    flow.innerHTML += `<div><b>${v.u}${v.d?'<span class="dev-tag">DEV</span>':''}:</b> ${v.m}</div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        },

        openModal: (id) => { sys.closeAll(); document.getElementById(id).classList.add('visible'); if(id==='modal-rank') sys.showRank(); if(id==='modal-diary') sys.loadDiary('easy'); },
        closeAll: () => { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('visible')); document.getElementById('main-menu').classList.add('visible'); },
        end: (m) => { 
            clearInterval(sys.timer); 
            if(sys.pts > sys.r) { 
                sys.r = sys.pts; 
                db.ref('users/'+sys.u).update({record: sys.pts}); 
            } 
            alert(m + "\nSKOR: " + sys.pts); 
            sys.upUI(); 
            sys.closeAll(); 
        }
    };

    document.getElementById('game-inp').addEventListener('keypress', e => { if(e.key==='Enter') sys.check(); });
</script>
</body>
</html>
