<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT | B & H STUDIOS</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --iron: #bdc3c7; --bronze: #cd7f32; --diamond: #00d2ff;
            --purple: #9b59b6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .big-card { background: rgba(255, 255, 255, 0.07); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 25px; width: 92%; max-width: 400px; padding: 25px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 15px 50px rgba(0,0,0,0.8); position: relative; }
        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-size: 14px; margin-bottom: 12px; text-align: center; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        
        .rank-DEVELOPER { color: var(--red); text-shadow: 0 0 15px var(--red); font-weight: 900; }
        .rank-ELİT { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
        .rank-ELMAS { color: var(--diamond); text-shadow: 0 0 10px var(--diamond); }
        .rank-ALTIN { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
        .rank-DEMİR { color: var(--iron); }
        .rank-BRONZ { color: var(--bronze); }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .list-container { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; max-height: 250px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .list-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        .word-tab { display: inline-block; padding: 6px 10px; margin: 3px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .word-learned { border-color: var(--green); color: var(--green); background: rgba(46, 204, 113, 0.1); font-weight: 800; }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 5px; z-index: 5000;">
    <button class="btn" style="width: auto; padding: 8px 12px; background: rgba(255,255,255,0.1); color:white; font-size: 10px;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; padding: 8px 12px; background: var(--purple); color:white; font-size: 10px;" onclick="sys.showFriends()">👥 ARKADAŞLAR</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <div style="font-family:'Orbitron'; font-weight:900; font-size:32px; color: var(--green); margin-bottom:20px;">WORD HUNT</div>
        <div id="login-form">
            <input type="text" id="username" placeholder="KULLANICI ADI">
            <input type="password" id="password" placeholder="ŞİFRE">
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.auth()">GİRİŞ YAP / KAYIT OL</button>
        </div>
        <div id="main-menu" style="display: none;">
            <div class="box-title" id="welcome-msg"></div>
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.openDifficulty()">🎮 TEKLİ OYNA</button>
            <button class="btn" style="background: var(--orange); color: white;" onclick="sys.showVsMenu()">⚔️ VS SİSTEMİ</button>
            <button class="btn" style="background: var(--blue); color: white;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
            <button class="btn" style="background: #333; color: white;" onclick="location.reload()">ÇIKIŞ</button>
        </div>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card">
        <div id="duel-info" style="font-size: 12px; color: var(--orange); font-weight: 800; margin-bottom: 10px; display: none;"></div>
        <div id="word" style="font-size: 35px; font-weight: 900; margin-bottom: 20px;">...</div>
        <input type="text" id="answer" placeholder="Cevabı yaz..." autocomplete="off">
        <button class="btn" onclick="sys.checkAnswer()" style="background:var(--blue); color:white">KONTROL</button>
        <div id="timer" style="color:var(--red); font-weight:900; font-size: 20px;">30</div>
    </div>
</div>

<div id="modal-container" class="overlay">
    <div class="big-card" id="modal-box">
        <div id="modal-content"></div>
        <div id="modal-actions" style="display:none; gap:10px; margin-top:15px;">
            <button id="modal-yes" class="btn" style="background:var(--green); color:black;">KABUL ET</button>
            <button id="modal-no" class="btn" style="background:var(--red); color:white;">REDDET</button>
        </div>
        <button id="modal-close" class="btn" style="background:#333; margin-top:20px; color:white;" onclick="document.getElementById('modal-container').style.display='none'">KAPAT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDQARwl0Dtelk1GBEC3HEyuPWNTPPc4Ks",
      authDomain: "bh-studios.firebaseapp.com",
      databaseURL: "https://bh-studios-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bh-studios",
      storageBucket: "bh-studios.firebasestorage.app",
      messagingSenderId: "113885803156",
      appId: "1:113885803156:web:02fc56453a263bd0e2fa81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const POOLS = {
        easy: [{tr:"Zaman",en:"time"},{tr:"Yıl",en:"year"},{tr:"İnsanlar",en:"people"},{tr:"Yol",en:"way"},{tr:"Gün",en:"day"},{tr:"Adam",en:"man"},{tr:"Şey",en:"thing"},{tr:"Kadın",en:"woman"},{tr:"Hayat",en:"life"},{tr:"Çocuk",en:"child"},{tr:"Dünya",en:"world"},{tr:"Okul",en:"school"},{tr:"Aile",en:"family"},{tr:"Öğrenci",en:"student"},{tr:"Grup",en:"group"},{tr:"El",en:"hand"},{tr:"Yer",en:"place"},{tr:"Hafta",en:"week"},{tr:"Kelime",en:"word"},{tr:"İş",en:"work"}],
        medium: [{tr:"Durum",en:"state"},{tr:"Ülke",en:"country"},{tr:"Sorun",en:"problem"},{tr:"Parça",en:"part"},{tr:"Vaka",en:"case"},{tr:"Şirket",en:"company"},{tr:"Sistem",en:"system"},{tr:"Kullanım",en:"use"},{tr:"Yüksek",en:"high"},{tr:"Farklı",en:"different"},{tr:"Büyük",en:"large"},{tr:"Sonraki",en:"next"},{tr:"Erken",en:"early"},{tr:"Önemli",en:"important"},{tr:"Kamu",en:"public"},{tr:"Yetenekli",en:"able"},{tr:"Çok",en:"very"},{tr:"Sık sık",en:"often"},{tr:"Gerçekten",en:"really"},{tr:"Hızlıca",en:"quickly"}],
        hard: [{tr:"Özellikle",en:"especially"},{tr:"Muhtemelen",en:"probably"},{tr:"Sonunda",en:"finally"},{tr:"Kolayca",en:"easily"},{tr:"Neredeyse",en:"nearly"},{tr:"Şu anda",en:"currently"},{tr:"Açıkça",en:"clearly"},{tr:"Tam olarak",en:"exactly"},{tr:"Güçlü",en:"strongly"},{tr:"Olmak",en:"become"}]
    };

    const sys = {
        name: "", score: 0, learned: [], timer: 30, active: false,
        isVs: false, p1Name: "", p2Name: "", p1Score: 0, p2Score: 0, vsTurn: 1,

        getRank: (s, n) => {
            if(n === 'burak') return "DEVELOPER";
            if(s >= 2000) return "ELİT"; if(s >= 1000) return "ELMAS"; if(s >= 500) return "ALTIN"; if(s >= 200) return "DEMİR"; return "BRONZ";
        },

        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return;
            db.ref('users/' + n).once('value', snap => {
                let u = snap.val();
                if(u && u.pass && u.pass !== p) return alert("Şifre hatalı!");
                sys.name = n;
                if(!u) db.ref('users/' + n).set({ pass: p, record: 0, learned: [], friends: [] });
                sys.learned = u?.learned || [];
                document.getElementById('login-form').style.display='none';
                document.getElementById('main-menu').style.display='block';
                document.getElementById('top-bar').style.display='flex';
                let r = sys.getRank(u?.record || 0, n);
                document.getElementById('welcome-msg').innerHTML = `SELAM, <span class="rank-${r}">${n.toUpperCase()}</span>`;
                sys.listenVs();
            });
        },

        listenVs: () => {
            db.ref('vs_requests/' + sys.name).on('value', snap => {
                const req = snap.val(); if(!req) return;
                sys.showConfirm(`${req.from.toUpperCase()} sana düello daveti yolladı!`, () => {
                    db.ref('vs_requests/' + sys.name).remove();
                    sys.isVs = true; sys.p1Name = req.from; sys.p2Name = sys.name;
                    sys.login('medium');
                }, () => db.ref('vs_requests/' + sys.name).remove());
            });
        },

        showVsMenu: () => {
            sys.showModal(`<div class="box-title">VS SİSTEMİ</div>
                <input id="vs-target" placeholder="RAKİP ADI">
                <button class="btn" style="background:var(--orange)" onclick="sys.sendVsReq()">UZAKTAN DAVET ET</button>
                <button class="btn" style="background:var(--blue)" onclick="sys.localVs()">LOKAL VS (YAN YANA)</button>`);
        },

        sendVsReq: () => {
            const t = document.getElementById('vs-target').value.trim().toLowerCase();
            if(t && t !== sys.name) {
                db.ref('vs_requests/' + t).set({ from: sys.name });
                alert("Davet gönderildi!");
            }
        },

        localVs: () => {
            sys.showModal(`<div class="box-title">LOKAL VS</div>
                <input id="lp1" placeholder="1. OYUNCU">
                <input id="lp2" placeholder="2. OYUNCU">
                <button class="btn" style="background:var(--green); color:black" onclick="sys.startLocalVs()">BAŞLAT</button>`);
        },

        startLocalVs: () => {
            sys.p1Name = document.getElementById('lp1').value || "P1";
            sys.p2Name = document.getElementById('lp2').value || "P2";
            sys.isVs = true; sys.vsTurn = 1;
            sys.login('medium');
        },

        showFriends: () => {
            db.ref('users/' + sys.name + '/friends').once('value', snap => {
                let html = `<div class="box-title">ARKADAŞLARIM</div><div class="list-container">`;
                if(snap.exists()) {
                    snap.forEach(f => { html += `<div class="list-item"><span>${f.val().toUpperCase()}</span><button onclick="sys.sendVsReqTo('${f.val()}')" style="background:var(--orange); border:none; padding:5px; border-radius:5px; color:white; font-size:10px;">VS</button></div>`; });
                } else html += "<p>Listen boş.</p>";
                sys.showModal(html + `</div>`);
            });
        },

        sendVsReqTo: (n) => { db.ref('vs_requests/' + n).set({ from: sys.name }); alert("Davet yollandı!"); },

        login: (l) => {
            sys.currentMode = l; sys.score = 0; sys.timer = 30; sys.active = true;
            document.getElementById('modal-container').style.display='none';
            document.getElementById('scr-login').style.display='none';
            document.getElementById('scr-game').style.display='flex';
            if(sys.isVs) {
                const cur = sys.vsTurn === 1 ? sys.p1Name : sys.p2Name;
                document.getElementById('duel-info').style.display = 'block';
                document.getElementById('duel-info').innerText = `SIRA: ${cur.toUpperCase()}`;
            }
            sys.startTimer(); sys.next();
        },

        startTimer: () => {
            let clock = setInterval(() => {
                if(!sys.active) return clearInterval(clock);
                sys.timer--; document.getElementById('timer').innerText = sys.timer;
                if(sys.timer <= 0) sys.finish();
            }, 1000);
        },

        next: () => {
            const p = POOLS[sys.currentMode];
            sys.cur = p[Math.floor(Math.random()*p.length)];
            document.getElementById('word').innerText = sys.cur.tr.toUpperCase();
            document.getElementById('answer').value = ""; document.getElementById('answer').focus();
        },

        checkAnswer: () => {
            if(document.getElementById('answer').value.toLowerCase().trim() === sys.cur.en) {
                sys.score += 50; sys.timer += 2;
                if(!sys.learned.includes(sys.cur.tr)) { sys.learned.push(sys.cur.tr); db.ref('users/'+sys.name).update({learned: sys.learned}); }
                confetti({particleCount:40}); sys.next();
            }
        },

        finish: () => {
            sys.active = false;
            if(!sys.isVs) {
                db.ref('users/'+sys.name).once('value', snap => {
                    const old = snap.val().record || 0;
                    if(sys.score > old) db.ref('users/'+sys.name).update({record: sys.score});
                    sys.showModal(`<div class="box-title">OYUN BİTTİ</div><h1>${sys.score} PUAN</h1>`, () => location.reload());
                });
            } else {
                if(sys.vsTurn === 1) {
                    sys.p1Score = sys.score; sys.vsTurn = 2;
                    sys.showModal(`SIRA ${sys.p2Name.toUpperCase()} OYUNCUSUNDA!`, () => sys.login(sys.currentMode));
                } else {
                    sys.p2Score = sys.score;
                    const win = sys.p1Score > sys.p2Score ? sys.p1Name : sys.p2Name;
                    sys.showModal(`<div class="box-title">VS BİTTİ</div><p>${sys.p1Name}: ${sys.p1Score}</p><p>${sys.p2Name}: ${sys.p2Score}</p><h2>KAZANAN: ${win.toUpperCase()}</h2>`, () => location.reload());
                }
            }
        },

        showModal: (h, cb) => {
            document.getElementById('modal-content').innerHTML = h;
            document.getElementById('modal-container').style.display = 'flex';
            document.getElementById('modal-actions').style.display = 'none';
            document.getElementById('modal-close').onclick = () => { document.getElementById('modal-container').style.display='none'; if(cb) cb(); };
        },

        showConfirm: (msg, yes, no) => {
            sys.showModal(msg);
            document.getElementById('modal-actions').style.display = 'flex';
            document.getElementById('modal-yes').onclick = () => { yes(); };
            document.getElementById('modal-no').onclick = () => { no(); document.getElementById('modal-container').style.display='none'; };
        },

        showProfile: () => {
            db.ref('users/' + sys.name).once('value', snap => {
                const u = snap.val(); const r = sys.getRank(u.record, sys.name);
                sys.showModal(`<div class="box-title">PROFİL</div><b class="rank-${r}">${sys.name.toUpperCase()} [${r}]</b><p>Rekor: ${u.record}</p>`);
            });
        },

        showLeaderboard: () => {
            db.ref('users').orderByChild('record').once('value', snap => {
                let html = `<div class="box-title">SIRALAMA</div><div class="list-container">`;
                let us = []; snap.forEach(u => us.push({n:u.key, s:u.val().record}));
                us.sort((a,b)=>b.s-a.s).slice(0,10).forEach((u,i) => {
                    let r = sys.getRank(u.s, u.n);
                    html += `<div class="list-item"><span>#${i+1} <b class="rank-${r}">${u.n.toUpperCase()}</b></span><b>${u.s}</b></div>`;
                });
                sys.showModal(html + `</div>`);
            });
        },

        openDifficulty: () => {
            sys.showModal(`<div class="box-title">ZORLUK</div>
                <button class="btn" style="background:var(--green)" onclick="sys.login('easy')">KOLAY</button>
                <button class="btn" style="background:var(--orange)" onclick="sys.login('medium')">ORTA</button>
                <button class="btn" style="background:var(--red)" onclick="sys.login('hard')">ZOR</button>`);
        }
    };
    document.getElementById('answer').addEventListener('keypress', e => { if(e.key==='Enter') sys.checkAnswer(); });
</script>
</body>
</html>
