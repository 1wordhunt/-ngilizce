<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT ULTIMATE | DEV BURAK</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --purple: #9b59b6; --dark: #0a0a0a; --card: #151515;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }
        
        .big-card { background: var(--card); border-radius: 30px; width: 95%; max-width: 450px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin: auto; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        .btn { width: 100%; padding: 15px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; color: #fff; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.95); }
        
        .dev-tag { background: var(--red); color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; animation: glow 1.5s infinite alternate; font-family: 'Orbitron'; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--red); } to { box-shadow: 0 0 20px var(--red); } }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); padding: 20px; }
        
        /* Günlük */
        #diary-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 350px; overflow-y: auto; background:#000; padding:15px; border-radius:15px; }
        .word-item { background: #222; padding: 10px; border-radius: 10px; font-size: 12px; text-align: left; transition: 0.3s; border-left: 4px solid transparent; }
        .word-known { border-left-color: var(--green); background: rgba(46, 204, 113, 0.1); color: var(--green); }
        
        /* Input */
        .game-input { width: 100%; padding: 18px; background: #111; border: 2px solid #333; color: #fff; border-radius: 15px; text-align: center; font-size: 22px; font-weight: 800; margin-bottom: 15px; }
        .game-input:focus { border-color: var(--blue); }

        #timer { font-size: 50px; color: var(--red); font-weight: 900; font-family: 'Orbitron'; text-shadow: 0 0 20px var(--red); }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 10px; z-index: 5000;">
    <button class="btn" style="width: auto; background: #222;" onclick="sys.openModal('modal-profile')">👤 PROFİL</button>
    <button class="btn" style="width: auto; background: var(--blue);" onclick="sys.openModal('modal-diary')">📖 GÜNLÜK</button>
</div>

<div id="scr-login" style="display: flex; height: 100vh; align-items: center;">
    <div class="big-card">
        <h1 style="font-family:'Orbitron'; color: var(--green); margin-bottom: 25px;">WORD HUNT PRO</h1>
        <input type="text" id="username" placeholder="KULLANICI ADI" style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:12px; text-align:center;">
        <input type="password" id="password" placeholder="ŞİFRE" style="width:100%; padding:15px; margin-bottom:20px; background:#111; border:1px solid #333; color:#fff; border-radius:12px; text-align:center;">
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.auth()">GİRİŞ YAP</button>
    </div>
</div>

<div id="main-menu" class="overlay" style="background: none;">
    <div class="big-card">
        <div id="welcome-area"></div>
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.startGame()">🎮 OYNA</button>
        <button class="btn" style="background: var(--orange);" onclick="sys.startVS()">⚔️ 1 VS 1</button>
        <button class="btn" style="background: var(--blue);" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
        <button class="btn" style="background: #333; margin-top: 15px;" onclick="location.reload()">ÇIKIŞ</button>
    </div>
</div>

<div id="modal-diary" class="overlay">
    <div class="big-card" style="max-width: 500px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:15px;">📖 GÜNLÜK</h2>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="btn" style="background:var(--green); font-size:10px;" onclick="sys.loadDiary('easy')">KOLAY</button>
            <button class="btn" style="background:var(--orange); font-size:10px;" onclick="sys.loadDiary('medium')">ORTA</button>
            <button class="btn" style="background:var(--red); font-size:10px;" onclick="sys.loadDiary('hard')">ZOR</button>
        </div>
        <div id="diary-list"></div>
        <button class="btn" style="background:#444; margin-top:15px;" onclick="sys.closeModals()">KAPAT</button>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card">
        <div id="timer">30</div>
        <div id="target-word" style="font-size: 42px; margin: 25px 0; font-weight: 800; color: #fff;">...</div>
        <input type="text" id="answer-input" class="game-input" placeholder="Cevabı yaz..." autocomplete="off">
        <div style="display:flex; justify-content: space-between; font-weight: 800; color:var(--gold);">
            <span>SKOR: <b id="current-score">0</b></span>
            <span id="level-label">KOLAY</span>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-rMw-MeHpSq0Zh4RX52Ct6DTXec9xCUM",
      authDomain: "ing-9dee1.firebaseapp.com",
      databaseURL: "https://ing-9dee1-default-rtdb.firebaseio.com",
      projectId: "ing-9dee1",
      storageBucket: "ing-9dee1.firebasestorage.app",
      messagingSenderId: "701609740939",
      appId: "1:701609740939:web:d13eded0401d2305da228e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 100 KELİME DAĞILIMI
    const ALL_WORDS = {
        easy: [
            {t:"Zaman",e:"time"}, {t:"Yıl",e:"year"}, {t:"İnsanlar",e:"people"}, {t:"Yol",e:"way"}, {t:"Gün",e:"day"},
            {t:"Adam",e:"man"}, {t:"Şey",e:"thing"}, {t:"Kadın",e:"woman"}, {t:"Hayat",e:"life"}, {t:"Çocuk",e:"child"},
            {t:"Dünya",e:"world"}, {t:"Okul",e:"school"}, {t:"Grup",e:"group"}, {t:"El",e:"hand"}, {t:"Parça",e:"part"},
            {t:"Yer",e:"place"}, {t:"Hafta",e:"week"}, {t:"Kelime",e:"word"}, {t:"İş",e:"work"}, {t:"Bakmak",e:"look"},
            {t:"İstemek",e:"want"}, {t:"İyi",e:"good"}, {t:"Yeni",e:"new"}, {t:"İlk",e:"first"}, {t:"Son",e:"last"},
            {t:"Büyük",e:"big"}, {t:"Küçük",e:"small"}, {t:"Kötü",e:"bad"}, {t:"Aynı",e:"same"}, {t:"Çok",e:"very"}
        ],
        medium: [
            {t:"Devlet",e:"state"}, {t:"Aile",e:"family"}, {t:"Öğrenci",e:"student"}, {t:"Ülke",e:"country"}, {t:"Sorun",e:"problem"},
            {t:"Durum",e:"case"}, {t:"Şirket",e:"company"}, {t:"Sistem",e:"system"}, {t:"Kullanmak",e:"use"}, {t:"Yapmak",e:"make"},
            {t:"Almak",e:"take"}, {t:"Vermek",e:"give"}, {t:"Gelmek",e:"come"}, {t:"Bulmak",e:"find"}, {t:"Anlatmak",e:"tell"},
            {t:"Sormak",e:"ask"}, {t:"Denemek",e:"try"}, {t:"İhtiyaç",e:"need"}, {t:"Hissetmek",e:"feel"}, {t:"Ayrılmak",e:"leave"},
            {t:"Aramak",e:"call"}, {t:"Tutmak",e:"keep"}, {t:"Başlamak",e:"start"}, {t:"Görünmek",e:"seem"}, {t:"Yardım",e:"help"},
            {t:"Konuşmak",e:"talk"}, {t:"Dönmek",e:"turn"}, {t:"Göstermek",e:"show"}, {t:"Uzun",e:"long"}, {t:"Harika",e:"great"},
            {t:"Eski",e:"old"}, {t:"Doğru",e:"right"}, {t:"Yüksek",e:"high"}, {t:"Genç",e:"young"}, {t:"Az",e:"few"}
        ],
        hard: [
            {t:"Olmak",e:"become"}, {t:"Başlamak",e:"begin"}, {t:"Kendi",e:"own"}, {t:"Farklı",e:"different"}, {t:"Geniş",e:"large"},
            {t:"Erken",e:"early"}, {t:"Önemli",e:"important"}, {t:"Kamu",e:"public"}, {t:"Yetenekli",e:"able"}, {t:"Sık sık",e:"often"},
            {t:"Gerçekten",e:"really"}, {t:"Hızlıca",e:"quickly"}, {t:"Yavaşça",e:"slowly"}, {t:"Her zaman",e:"always"}, {t:"Bazen",e:"sometimes"},
            {t:"Genellikle",e:"usually"}, {t:"Birlikte",e:"together"}, {t:"Zaten",e:"already"}, {t:"Neredeyse",e:"almost"}, {t:"Özellikle",e:"especially"},
            {t:"Muhtemelen",e:"probably"}, {t:"Sonunda",e:"finally"}, {t:"Kolayca",e:"easily"}, {t:"Son zamanlarda",e:"recently"}, {t:"Hemen",e:"immediately"},
            {t:"Şu anda",e:"currently"}, {t:"Açıkça",e:"clearly"}, {t:"Basitçe",e:"simply"}, {t:"Tam olarak",e:"exactly"}, {t:"Güçlüce",e:"strongly"}
        ]
    };

    const sys = {
        uName: "", record: 0, isDev: false, time: 30, score: 0, curW: null, knows: {}, timer: null,
        
        auth: () => {
            const n = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return alert("Boş bırakma!");
            
            db.ref('users/'+n).once('value', snap => {
                const u = snap.val();
                if(u && u.pass !== p) return alert("Şifre yanlış!");
                
                sys.uName = n;
                sys.record = u?.record || 0;
                sys.knows = u?.knows || {};
                sys.isDev = (n.toLowerCase() === "burak");
                
                if(!u) db.ref('users/'+n).set({pass:p, record:0});
                
                document.getElementById('scr-login').style.display='none';
                document.getElementById('main-menu').style.display='flex';
                document.getElementById('top-bar').style.display='flex';
                sys.upMenu();
            });
        },

        upMenu: () => {
            const tag = sys.isDev ? '<span class="dev-tag">DEVELOPER</span>' : '';
            document.getElementById('welcome-area').innerHTML = `
                <h2 style="margin-bottom:5px;">SELAM, ${sys.uName.toUpperCase()} ${tag}</h2>
                <p style="color:var(--gold); font-weight:800;">REKORUN: ${sys.record}</p>
            `;
        },

        loadDiary: (diff) => {
            const list = document.getElementById('diary-list');
            list.innerHTML = "";
            ALL_WORDS[diff].forEach(w => {
                const isKnown = sys.knows[w.e] ? 'word-known' : '';
                const tick = sys.knows[w.e] ? ' ✓' : '';
                list.innerHTML += `<div class="word-item ${isKnown}">${w.t}: <b>${w.e}</b>${tick}</div>`;
            });
        },

        startGame: () => {
            sys.score = 0; sys.time = 30;
            document.getElementById('current-score').innerText = "0";
            document.getElementById('scr-game').style.display = 'flex';
            sys.next();
            sys.timer = setInterval(() => {
                sys.time--;
                document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) sys.end();
            }, 1000);
        },

        next: () => {
            let diff = 'easy';
            if(sys.score >= 500) diff = 'medium';
            if(sys.score >= 1200) diff = 'hard';
            
            const pool = ALL_WORDS[diff];
            sys.curW = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('target-word').innerText = sys.curW.t;
            document.getElementById('level-label').innerText = diff.toUpperCase();
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        },

        check: () => {
            const val = document.getElementById('answer-input').value.trim().toLowerCase();
            if(val === sys.curW.e) {
                sys.score += 50; sys.time += 2;
                document.getElementById('current-score').innerText = sys.score;
                confetti({particleCount: 40, spread: 60, origin: { y: 0.8 }});
                
                // Firebase Kayıt (Bildiğim kelime)
                sys.knows[sys.curW.e] = true;
                db.ref('users/'+sys.uName+'/knows/'+sys.curW.e).set(true);
                
                sys.next();
            }
        },

        showLeaderboard: () => {
            db.ref('users').orderByChild('record').limitToLast(10).once('value', s => {
                let list = "🏆 TOP 10 SIRALAMA\n\n";
                let users = [];
                s.forEach(u => { users.push({n: u.key, s: u.val().record}); });
                users.reverse().forEach((u, i) => { list += `${i+1}. ${u.n.toUpperCase()} - ${u.s} Puan\n`; });
                alert(list);
            });
        },

        end: () => {
            clearInterval(sys.timer);
            if(sys.score > sys.record) db.ref('users/'+sys.uName).update({record: sys.score});
            alert("SÜRE BİTTİ!\nSkorun: " + sys.score);
            location.reload();
        },

        startVS: () => alert("VS Modu Hazırlanıyor..."),
        openModal: (id) => { 
            if(id === 'modal-diary') sys.loadDiary('easy');
            document.getElementById(id).style.display='flex'; 
        },
        closeModals: () => document.querySelectorAll('.overlay').forEach(o => o.style.display='none')
    };

    document.getElementById('answer-input').addEventListener('keypress', e => {
        if(e.key === 'Enter') sys.check();
    });
</script>
</body>
</html>
