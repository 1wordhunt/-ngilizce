<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT PRO | B&H</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --purple: #9b59b6; --dark: #0a0a0a; --card: #151515;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .big-card { background: var(--card); border-radius: 30px; width: 95%; max-width: 480px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; transition: all 0.3s; }
        
        /* Efektler */
        .flash-correct { animation: pulseGreen 0.5s ease; border: 2px solid var(--green) !important; }
        .flash-wrong { animation: shakeRed 0.5s ease; border: 2px solid var(--red) !important; }
        @keyframes pulseGreen { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px var(--green); } 100% { transform: scale(1); } }
        @keyframes shakeRed { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; margin-bottom: 20px; letter-spacing: 2px; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #222; background: #111; color: #fff; font-size: 18px; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; color: #fff; }
        .btn:active { transform: scale(0.95); }
        
        #timer { font-family: 'Orbitron'; font-size: 35px; color: var(--red); font-weight: 900; text-shadow: 0 0 15px var(--red); }
        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 10px; z-index: 5000;">
    <button class="btn" style="width: auto; background: #222;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; background: var(--blue);" onclick="sys.showDiary()">📖 GÜNLÜK</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <h1 class="box-title" style="color: var(--green);">WORD HUNT PRO</h1>
        <input type="text" id="username" placeholder="KULLANICI ADI">
        <input type="password" id="password" placeholder="ŞİFRE">
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.auth()">GİRİŞ</button>
    </div>
</div>

<div id="main-menu" class="overlay" style="background: none;">
    <div class="big-card">
        <div id="welcome-msg" style="margin-bottom: 25px;"></div>
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.start()">🎮 OYNA</button>
        <button class="btn" style="background: var(--blue);" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
        <button class="btn" style="background: #333;" onclick="location.reload()">ÇIKIŞ</button>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div id="game-card" class="big-card">
        <div id="timer">30</div>
        <div id="target-word" class="box-title" style="font-size: 42px;">...</div>
        <input type="text" id="answer-input" placeholder="Cevabı yaz..." autocomplete="off">
        <button class="btn" style="background: var(--blue);" onclick="sys.check()">KONTROL ET</button>
        <div id="score-now" style="font-weight: 800; color: var(--gold);">SKOR: 0</div>
    </div>
</div>

<script>
    // Burak, senin paylaştığın config bilgilerini buraya yerleştirdim
    const firebaseConfig = {
      apiKey: "AIzaSyA-rMw-MeHpSq0Zh4RX52Ct6DTXec9xCUM",
      authDomain: "ing-9dee1.firebaseapp.com",
      databaseURL: "https://ing-9dee1-default-rtdb.firebaseio.com",
      projectId: "ing-9dee1",
      storageBucket: "ing-9dee1.firebasestorage.app",
      messagingSenderId: "701609740939",
      appId: "1:701609740939:web:d13eded0401d2305da228e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const LIST = [
        {tr:"Zaman", en:"time"}, {tr:"Yıl", en:"year"}, {tr:"İnsan", en:"people"}, {tr:"Yol", en:"way"},
        {tr:"Gün", en:"day"}, {tr:"Adam", en:"man"}, {tr:"Hayat", en:"life"}, {tr:"Dünya", en:"world"}
    ];

    const sys = {
        name: "", score: 0, time: 30, tObj: null, curW: null, gameScore: 0,
        
        getRank: (s) => {
            if(s >= 2000) return {n:"ELİT", c:"var(--red)"};
            if(s >= 1000) return {n:"ELMAS", c:"var(--blue)"};
            if(s >= 500) return {n:"ALTIN", c:"var(--gold)"};
            if(s >= 200) return {n:"DEMİR", c:"#aaa"};
            return {n:"BRONZ", c:"#cd7f32"};
        },

        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return;
            db.ref('users/'+n).once('value', snap => {
                let u = snap.val();
                if(u && u.pass !== p) return alert("Şifre Hatalı!");
                sys.name = n;
                sys.score = u?.record || 0;
                if(!u) db.ref('users/'+n).set({pass:p, record:0});
                document.getElementById('scr-login').style.display='none';
                document.getElementById('main-menu').style.display='flex';
                document.getElementById('top-bar').style.display='flex';
                sys.upUI();
            });
        },

        upUI: () => {
            const r = sys.getRank(sys.score);
            document.getElementById('welcome-msg').innerHTML = `
                <h2 style="color:${r.c}">${sys.name.toUpperCase()}</h2>
                <small>${r.n} RÜTBESİ | REKOR: ${sys.score}</small>
            `;
        },

        start: () => {
            sys.time = 30; sys.gameScore = 0;
            document.getElementById('scr-game').style.display='flex';
            document.getElementById('score-now').innerText = "SKOR: 0";
            sys.next();
            sys.tObj = setInterval(() => {
                sys.time--; 
                document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) sys.end();
            }, 1000);
        },

        next: () => {
            sys.curW = LIST[Math.floor(Math.random()*LIST.length)];
            document.getElementById('target-word').innerText = sys.curW.tr;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        },

        check: () => {
            const inp = document.getElementById('answer-input');
            const card = document.getElementById('game-card');
            if(inp.value.trim().toLowerCase() === sys.curW.en) {
                sys.gameScore += 50;
                sys.time += 2;
                document.getElementById('score-now').innerText = "SKOR: " + sys.gameScore;
                card.classList.add('flash-correct');
                confetti({particleCount: 40, spread: 70, origin: { y: 0.6 }});
                setTimeout(() => card.classList.remove('flash-correct'), 500);
                sys.next();
            } else {
                card.classList.add('flash-wrong');
                setTimeout(() => card.classList.remove('flash-wrong'), 500);
            }
        },

        end: () => {
            clearInterval(sys.tObj);
            if(sys.gameScore > sys.score) {
                db.ref('users/'+sys.name).update({record: sys.gameScore});
            }
            alert("OYUN BİTTİ! PUANIN: " + sys.gameScore);
            location.reload();
        }
    };

    document.addEventListener('keypress', e => { if(e.key === 'Enter') sys.check(); });
</script>
</body>
</html>
