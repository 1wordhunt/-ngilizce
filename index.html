<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT | B & H STUDIOS</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --iron: #bdc3c7; --bronze: #cd7f32; --diamond: #00d2ff;
            --purple: #9b59b6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .big-card { background: rgba(255, 255, 255, 0.07); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 25px; width: 92%; max-width: 400px; padding: 25px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 15px 50px rgba(0,0,0,0.8); position: relative; }
        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-size: 14px; margin-bottom: 12px; text-align: center; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        
        .rank-DEVELOPER { color: var(--red); text-shadow: 0 0 15px var(--red); font-weight: 900; }
        .rank-ELİT { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
        .rank-ELMAS { color: var(--diamond); text-shadow: 0 0 10px var(--diamond); }
        .rank-ALTIN { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
        .rank-DEMİR { color: var(--iron); }
        .rank-BRONZ { color: var(--bronze); }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .list-container { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; max-height: 250px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .list-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        .word-tab { display: inline-block; padding: 6px 10px; margin: 3px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .word-learned { border-color: var(--green); color: var(--green); background: rgba(46, 204, 113, 0.1); font-weight: 800; }
        
        .rank-info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .rank-info-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 5px; z-index: 5000;">
    <button class="btn" style="width: auto; padding: 8px 12px; background: rgba(255,255,255,0.1); color:white; font-size: 10px;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; padding: 8px 12px; background: var(--blue); color:white; font-size: 10px;" onclick="sys.showDiary()">📖 GÜNLÜK</button>
    <button class="btn" style="width: auto; padding: 8px 12px; background: var(--purple); color:white; font-size: 10px;" onclick="sys.showRankInfo()">🏆 RÜTBELER</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <div style="font-family:'Orbitron'; font-weight:900; font-size:32px; color: var(--green); margin-bottom:20px;">WORD HUNT</div>
        <div id="login-form">
            <input type="text" id="username" placeholder="KULLANICI ADI">
            <input type="password" id="password" placeholder="ŞİFRE">
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.auth()">GİRİŞ YAP</button>
        </div>
        <div id="main-menu" style="display: none;">
            <div class="box-title" id="welcome-msg"></div>
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.openDifficulty()">🎮 OYNA</button>
            <button class="btn" style="background: var(--blue); color: white;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
            <button class="btn" style="background: var(--gold); color: black;" onclick="sys.showSuggest()">💡 ÖNERİLER</button>
            <button class="btn" style="background: #333; color: white;" onclick="location.reload()">ÇIKIŞ</button>
        </div>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card">
        <div id="word" style="font-size: 35px; font-weight: 900; margin-bottom: 20px;">...</div>
        <input type="text" id="answer" placeholder="Cevabı yaz..." autocomplete="off">
        <button class="btn" onclick="sys.checkAnswer()" style="background:var(--blue); color:white">KONTROL</button>
        <div id="timer" style="color:var(--red); font-weight:900; font-size: 20px;">30</div>
    </div>
</div>

<div id="modal-container" class="overlay">
    <div class="big-card">
        <div id="modal-content"></div>
        <button class="btn" style="background:#333; margin-top:20px; color:white;" onclick="document.getElementById('modal-container').style.display='none'">KAPAT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDQARwl0Dtelk1GBEC3HEyuPWNTPPc4Ks",
      authDomain: "bh-studios.firebaseapp.com",
      databaseURL: "https://bh-studios-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bh-studios",
      storageBucket: "bh-studios.firebasestorage.app",
      messagingSenderId: "113885803156",
      appId: "1:113885803156:web:02fc56453a263bd0e2fa81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 100 KELİMELİK TAM LİSTE (KOLAY-ORTA-ZOR OLARAK DAĞITILDI)
    const POOLS = {
        easy: [
            {tr:"Zaman",en:"time"},{tr:"Yıl",en:"year"},{tr:"İnsanlar",en:"people"},{tr:"Yol",en:"way"},{tr:"Gün",en:"day"},{tr:"Adam",en:"man"},{tr:"Şey",en:"thing"},{tr:"Kadın",en:"woman"},{tr:"Hayat",en:"life"},{tr:"Çocuk",en:"child"},
            {tr:"Dünya",en:"world"},{tr:"Okul",en:"school"},{tr:"Aile",en:"family"},{tr:"Öğrenci",en:"student"},{tr:"Grup",en:"group"},{tr:"El",en:"hand"},{tr:"Yer",en:"place"},{tr:"Hafta",en:"week"},{tr:"Kelime",en:"word"},{tr:"İş",en:"work"},
            {tr:"İyi",en:"good"},{tr:"Yeni",en:"new"},{tr:"Uzun",en:"long"},{tr:"Küçük",en:"small"},{tr:"Kötü",en:"bad"},{tr:"Aynı",en:"same"},{tr:"Büyük",en:"big"},{tr:"Eski",en:"old"},{tr:"Doğru",en:"right"},{tr:"Genç",en:"young"},
            {tr:"Bakmak",en:"look"},{tr:"İstemek",en:"want"},{tr:"Söylemek",en:"tell"},{tr:"Sormak",en:"ask"},{tr:"Görmek",en:"show"},{tr:"Gelmek",en:"come"},{tr:"Bulmak",en:"find"},{tr:"Yapmak",en:"make"},{tr:"Almak",en:"take"},{tr:"Vermek",en:"give"}
        ],
        medium: [
            {tr:"Durum",en:"state"},{tr:"Ülke",en:"country"},{tr:"Sorun",en:"problem"},{tr:"Parça",en:"part"},{tr:"Durum/Vaka",en:"case"},{tr:"Şirket",en:"company"},{tr:"Sistem",en:"system"},{tr:"Kullanım",en:"use"},{tr:"Yüksek",en:"high"},{tr:"Farklı",en:"different"},
            {tr:"Büyük/Geniş",en:"large"},{tr:"Sonraki",en:"next"},{tr:"Erken",en:"early"},{tr:"Önemli",en:"important"},{tr:"Halk/Kamu",en:"public"},{tr:"Yetenekli",en:"able"},{tr:"Çok",en:"very"},{tr:"Sık sık",en:"often"},{tr:"Gerçekten",en:"really"},{tr:"Hızlıca",en:"quickly"},
            {tr:"Yavaşça",en:"slowly"},{tr:"İyi/Pekiyi",en:"well"},{tr:"Her zaman",en:"always"},{tr:"Bazen",en:"sometimes"},{tr:"Genellikle",en:"usually"},{tr:"Birlikte",en:"together"},{tr:"Neredeyse",en:"almost"},{tr:"Zaten",en:"already"},{tr:"Başlamak",en:"start"},{tr:"Görünmek",en:"seem"},
            {tr:"Yardım etmek",en:"help"},{tr:"Konuşmak",en:"talk"},{tr:"Dönmek",en:"turn"},{tr:"Başlamak",en:"begin"},{tr:"Aramak",en:"call"},{tr:"Tutmak",en:"keep"},{tr:"Ayrılmak",en:"leave"},{tr:"Hissetmek",en:"feel"},{tr:"İhtiyaç",en:"need"},{tr:"Denemek",en:"try"}
        ],
        hard: [
            {tr:"Özellikle",en:"especially"},{tr:"Muhtemelen",en:"probably"},{tr:"Sonunda",en:"finally"},{tr:"Kolayca",en:"easily"},{tr:"Son zamanlarda",en:"recently"},{tr:"Hemen",en:"immediately"},{tr:"Neredeyse",en:"nearly"},{tr:"Şu anda",en:"currently"},{tr:"Açıkça",en:"clearly"},{tr:"Basitçe",en:"simply"},
            {tr:"Tam olarak",en:"exactly"},{tr:"Güçlü bir şekilde",en:"strongly"},{tr:"Olmak",en:"become"},{tr:"Az",en:"few"},{tr:"Kendi",en:"own"},{tr:"Diğer",en:"other"},{tr:"Harika",en:"great"},{tr:"Küçük/Az",en:"little"},{tr:"Birinci",en:"first"},{tr:"Sonuncu",en:"last"}
        ]
    };

    const sys = {
        name: "", score: 0, learned: [], timer: 30, active: false,
        getRank: (s, n) => {
            if(n === 'burak') return "DEVELOPER";
            if(s >= 2000) return "ELİT"; if(s >= 1000) return "ELMAS"; if(s >= 500) return "ALTIN"; if(s >= 200) return "DEMİR"; return "BRONZ";
        },

        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            if(!n) return;
            db.ref('users/' + n).once('value', snap => {
                let u = snap.val();
                sys.name = n;
                if(!u) db.ref('users/' + n).set({ record: 0, learned: [] });
                sys.learned = u?.learned || [];
                document.getElementById('login-form').style.display='none';
                document.getElementById('main-menu').style.display='block';
                document.getElementById('top-bar').style.display='flex';
                let r = sys.getRank(u?.record || 0, n);
                document.getElementById('welcome-msg').innerHTML = `SELAM, <span class="rank-${r}">${n.toUpperCase()}</span>`;
            });
        },

        showRankInfo: () => {
            sys.showModal(`
                <div class="box-title">RÜTBE SİSTEMİ</div>
                <table class="rank-info-table">
                    <tr><td><b class="rank-BRONZ">BRONZ</b></td><td>0 - 200 Puan</td></tr>
                    <tr><td><b class="rank-DEMİR">DEMİR</b></td><td>200 - 500 Puan</td></tr>
                    <tr><td><b class="rank-ALTIN">ALTIN</b></td><td>500 - 1000 Puan</td></tr>
                    <tr><td><b class="rank-ELMAS">ELMAS</b></td><td>1000 - 2000 Puan</td></tr>
                    <tr><td><b class="rank-ELİT">ELİT</b></td><td>2000+ Puan</td></tr>
                    <tr><td><b class="rank-DEVELOPER">DEVELOPER</b></td><td>Özel Yetki</td></tr>
                </table>
                <p style="font-size:10px; margin-top:10px; opacity:0.7;">Puan kazanmak için oyun modlarında rekorunuzu geliştirin!</p>
            `);
        },

        showProfile: () => {
            db.ref('users/' + sys.name).once('value', snap => {
                const u = snap.val(); const r = sys.getRank(u.record, sys.name);
                sys.showModal(`<div class="box-title">PROFİLİM</div>
                    <div class="list-item"><span>İSİM:</span><b class="rank-${r}">${sys.name.toUpperCase()}</b></div>
                    <div class="list-item"><span>RÜTBE:</span><b class="rank-${r}">${r}</b></div>
                    <div class="list-item"><span>EN YÜKSEK SKOR:</span><b style="color:var(--gold)">${u.record}</b></div>
                    <button class="btn" style="background:var(--blue); font-size:10px; margin-top:10px;" onclick="sys.showRankInfo()">NASIL RÜTBE ALIRIM?</button>`);
            });
        },

        showLeaderboard: () => {
            db.ref('users').orderByChild('record').once('value', snap => {
                let html = `<div class="box-title">DÜNYA SIRALAMASI</div><div class="list-container">`;
                let users = []; snap.forEach(u => { users.push({ n: u.key, s: u.val().record || 0 }); });
                users.sort((a,b) => b.s - a.s).slice(0,10).forEach((u, i) => {
                    let r = sys.getRank(u.s, u.n);
                    html += `<div class="list-item"><span>#${i+1} <b class="rank-${r}">${u.n.toUpperCase()}</b> [${r}]</span><b class="rank-${r}">${u.s}</b></div>`;
                });
                sys.showModal(html + `</div>`);
            });
        },

        showSuggest: () => {
            let html = `<div class="box-title">ÖNERİLER</div>
                <textarea id="s-msg" placeholder="Geliştiriciye not bırak..."></textarea>
                <button class="btn" style="background:var(--gold); color:black" onclick="sys.sendS()">GÖNDER</button>
                <div id="s-list" class="list-container"></div>`;
            sys.showModal(html);
            db.ref('suggestions').limitToLast(10).on('value', snap => {
                const list = document.getElementById('s-list'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(s => { 
                    const d = s.val();
                    list.innerHTML = `<div class="list-item" style="flex-direction:column; align-items:start">
                        <b class="rank-${d.rank}">${d.rank} | ${d.user}:</b><span style="opacity:0.8">${d.msg}</span>
                    </div>` + list.innerHTML;
                });
            });
        },

        sendS: () => {
            const m = document.getElementById('s-msg').value.trim();
            if(!m) return;
            db.ref('users/'+sys.name).once('value', snap => {
                const r = sys.getRank(snap.val().record, sys.name);
                db.ref('suggestions').push({ user: sys.name.toUpperCase(), msg: m, rank: r });
                document.getElementById('s-msg').value = "";
            });
        },

        showDiary: () => {
            let html = `<div class="box-title">KELİME GÜNLÜĞÜ</div>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="btn" style="padding:10px; font-size:9px; background:var(--green); color:black" onclick="sys.renderDiary('easy')">KOLAY</button>
                    <button class="btn" style="padding:10px; font-size:9px; background:var(--orange)" onclick="sys.renderDiary('medium')">ORTA</button>
                    <button class="btn" style="padding:10px; font-size:9px; background:var(--red)" onclick="sys.renderDiary('hard')">ZOR</button>
                </div>
                <div id="diary-box" class="list-container"></div>`;
            sys.showModal(html); sys.renderDiary('easy');
        },

        renderDiary: (mode) => {
            const box = document.getElementById('diary-box'); box.innerHTML = "";
            POOLS[mode].forEach(w => {
                let ok = sys.learned.includes(w.tr);
                box.innerHTML += `<div class="word-tab ${ok?'word-learned':''}">${w.tr} ${ok?'✓':''}</div>`;
            });
        },

        showModal: (h) => {
            document.getElementById('modal-content').innerHTML = h;
            document.getElementById('modal-container').style.display = 'flex';
        },

        openDifficulty: () => {
            sys.showModal(`<div class="box-title">ZORLUK SEÇ</div>
                <button class="btn" style="background:var(--green); color:black" onclick="sys.login('easy')">KOLAY (TEMEL)</button>
                <button class="btn" style="background:var(--orange)" onclick="sys.login('medium')">ORTA (GÜNLÜK)</button>
                <button class="btn" style="background:var(--red)" onclick="sys.login('hard')">ZOR (İLERİ)</button>`);
        },

        login: (l) => {
            sys.currentMode = l; sys.score = 0; sys.timer = 30; sys.active = true;
            document.getElementById('modal-container').style.display='none';
            document.getElementById('scr-login').style.display='none';
            document.getElementById('scr-game').style.display='flex';
            sys.startTimer();
            sys.next();
        },

        startTimer: () => {
            let clock = setInterval(() => {
                if(!sys.active) return clearInterval(clock);
                sys.timer--;
                document.getElementById('timer').innerText = sys.timer;
                if(sys.timer <= 0) sys.finish();
            }, 1000);
        },

        next: () => {
            const p = POOLS[sys.currentMode];
            sys.cur = p[Math.floor(Math.random()*p.length)];
            document.getElementById('word').innerText = sys.cur.tr.toUpperCase();
            document.getElementById('answer').value = "";
            document.getElementById('answer').focus();
        },

        checkAnswer: () => {
            if(document.getElementById('answer').value.toLowerCase().trim() === sys.cur.en) {
                sys.score += 50;
                sys.timer += 2;
                if(!sys.learned.includes(sys.cur.tr)) {
                    sys.learned.push(sys.cur.tr);
                    db.ref('users/'+sys.name).update({learned: sys.learned});
                }
                confetti({particleCount:40, spread: 70, origin: { y: 0.6 }}); 
                sys.next();
            }
        },

        finish: () => {
            sys.active = false;
            db.ref('users/'+sys.name).once('value', snap => {
                const old = snap.val().record || 0;
                if(sys.score > old) db.ref('users/'+sys.name).update({record: sys.score});
                sys.showModal(`<div class="box-title">OYUN BİTTİ</div><h1>${sys.score} PUAN</h1><p>Rekorun kaydedildi!</p>`, () => location.reload());
            });
            document.getElementById('scr-game').style.display='none';
            document.getElementById('scr-login').style.display='contents';
        }
    };
    
    document.getElementById('answer').addEventListener('keypress', e => { if(e.key==='Enter') sys.checkAnswer(); });
</script>
</body>
</html>
