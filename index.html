<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT PRO | B & H STUDIOS</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; --gold: #f1c40f; --purple: #9b59b6; --dark: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .big-card { background: #1c1c1c; border-radius: 30px; width: 95%; max-width: 500px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; margin-bottom: 15px; }
        input { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #262626; color: #fff; font-size: 16px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 15px; border-radius: 20px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .hearts { font-size: 32px; margin-bottom: 10px; }
        #timer { font-family: 'Orbitron'; font-size: 30px; color: var(--red); margin-bottom: 10px; text-shadow: 0 0 10px var(--red); }
        .badge-img { width: 22px; height: 22px; vertical-align: middle; border-radius: 50%; }
        .rank-DEV { color: var(--red); text-shadow: 0 0 10px var(--red); }
        .hint-frame { width: 100%; height: 180px; border-radius: 20px; background-size: cover; background-position: center; margin-bottom: 15px; display: none; border: 2px solid #333; }
        .list-box { background: #111; padding: 15px; border-radius: 20px; max-height: 250px; overflow-y: auto; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 8px; z-index: 5000;">
    <button class="btn" style="width: auto; padding: 10px 15px; background: #1c1c1c;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--blue);" onclick="sys.showDiary()">📖 GÜNLÜK</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--purple);" onclick="sys.showSearch()">🔍 ARA</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <h1 class="box-title" style="color: var(--green);">WORD HUNT PRO</h1>
        <input type="text" id="username" placeholder="KULLANICI ADI">
        <input type="password" id="password" placeholder="ŞİFRE">
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.auth()">BAŞLA / KAYIT</button>
    </div>
</div>

<div id="main-menu" class="overlay" style="display: none; background: none;">
    <div class="big-card">
        <div id="welcome-msg" style="margin-bottom: 20px;"></div>
        <button class="btn" style="background: var(--green); color: #000;" onclick="sys.startGame()">🎮 OYNA</button>
        <button class="btn" style="background: var(--orange); color: #fff;" onclick="sys.showVsMenu()">⚔️ VS MODU</button>
        <button class="btn" style="background: var(--gold); color: #000;" onclick="sys.showChat()">💬 CHAT</button>
        <button class="btn" style="background: var(--blue); color: #fff;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
        <button class="btn" style="background: #333;" onclick="location.reload()">ÇIKIŞ</button>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card">
        <div id="timer">30</div>
        <div id="game-hearts" class="hearts">❤️ ❤️ ❤️</div>
        <div id="hint-img" class="hint-frame"></div>
        <div id="target-word" class="box-title" style="font-size: 35px;">WORD</div>
        <input type="text" id="answer-input" placeholder="CEVAP..." autocomplete="off">
        <button class="btn" style="background: var(--blue); color: #fff;" onclick="sys.check()">KONTROL</button>
        <button class="btn" style="background: var(--gold); color: #000;" onclick="sys.useHint()">💡 İPUCU (-1 CAN)</button>
    </div>
</div>

<div id="modal" class="overlay">
    <div class="big-card">
        <div id="modal-content"></div>
        <button class="btn" style="background:#444; margin-top:15px;" onclick="sys.closeModal()">KAPAT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDQARwl0Dtelk1GBEC3HEyuPWNTPPc4Ks",
      authDomain: "bh-studios.firebaseapp.com",
      databaseURL: "https://bh-studios-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bh-studios",
      storageBucket: "bh-studios.firebasestorage.app",
      messagingSenderId: "113885803156",
      appId: "1:113885803156:web:02fc56453a263bd0e2fa81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const WORDS = ["time","year","people","way","day","man","thing","woman","life","child","world","school","state","family","student","group","country","problem","hand","part","place","case","week","company","system","word","work","use","make","take","give","come","look","want","find","tell","ask","try","need","feel","become","leave","call","keep","start","seem","help","talk","turn","begin","show","good","new","first","last","long","great","little","own","other","old","right","big","high","different","small","large","next","early","young","important","few","public","bad","same","able","very","often","really","quickly","slowly","well","always","sometimes","usually","together","already","almost","especially","probably","finally","easily","recently","immediately","nearly","currently","clearly","simply","exactly","strongly"];

    const sys = {
        uName: "", role: "USER", score: 0, lives: 3, time: 30, tObj: null, curW: "",
        getBadge: (r) => {
            const img = "https://i.ibb.co/MxyTs8NM/MG-20260427-112534-638.jpg";
            if(r==='DEVELOPER') return `<img src="${img}" class="badge-img"> <span class="rank-DEV">DEV</span>`;
            if(r==='MODERATOR') return `<img src="${img}" class="badge-img" style="filter:hue-rotate(250deg)"> <span style="color:var(--purple)">MOD</span>`;
            return "🥉 ÜYE";
        },
        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return;
            db.ref('users/'+n).once('value', snap => {
                let u = snap.val();
                if(u) {
                    if(u.pass !== p) return alert("Şifre Yanlış!");
                    if(u.ban && u.ban > Date.now()) return alert("BANLISIN!");
                } else {
                    db.ref('users/'+n).set({pass:p, record:0, role: n==='burak'?'DEVELOPER':'USER'});
                }
                sys.uName = n; sys.role = u?.role || (n==='burak'?'DEVELOPER':'USER');
                document.getElementById('scr-login').style.display='none';
                document.getElementById('main-menu').style.display='flex';
                document.getElementById('top-bar').style.display='flex';
                document.getElementById('welcome-msg').innerHTML = `<h2>${sys.getBadge(sys.role)} ${n.toUpperCase()}</h2>`;
            });
        },
        startGame: () => {
            sys.lives = 3; sys.score = 0; sys.time = 30;
            document.getElementById('main-menu').style.display='none';
            document.getElementById('scr-game').style.display='flex';
            sys.upHearts(); sys.next();
            sys.tObj = setInterval(() => {
                sys.time--; document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) sys.end();
            }, 1000);
        },
        next: () => {
            sys.curW = WORDS[Math.floor(Math.random()*WORDS.length)];
            document.getElementById('target-word').innerText = sys.curW.toUpperCase();
            document.getElementById('answer-input').value = "";
            document.getElementById('hint-img').style.display='none';
        },
        check: () => {
            if(document.getElementById('answer-input').value.trim().toLowerCase() === sys.curW) {
                sys.score += 50; sys.time += 2; confetti({particleCount:40}); sys.next();
            } else { sys.lives--; sys.upHearts(); if(sys.lives<=0) sys.end(); }
        },
        useHint: () => {
            if(sys.lives > 1) {
                sys.lives--; sys.upHearts();
                document.getElementById('hint-img').style.backgroundImage = `url('https://i.ibb.co/TxCVYtX4/MG-20260415-WA0174.jpg')`;
                document.getElementById('hint-img').style.display='block';
            } else alert("Canın biter!");
        },
        upHearts: () => {
            let h = ""; for(let i=0; i<3; i++) h += i < sys.lives ? "❤️ " : "🖤 ";
            document.getElementById('game-hearts').innerHTML = h;
        },
        end: () => { clearInterval(sys.tObj); alert("BİTTİ! Skor: "+sys.score); location.reload(); },
        showSearch: () => {
            sys.showModal(`<h3>ARA</h3><input oninput="sys.src(this.value)"><div id="rl" class="list-box"></div>`);
        },
        src: (v) => {
            db.ref('users').once('value', s => {
                let b = document.getElementById('rl'); b.innerHTML = "";
                s.forEach(u => {
                    if(u.key.includes(v.toLowerCase())) b.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">${u.key} ${sys.role==='DEVELOPER' ? `<button onclick="sys.mng('${u.key}')">YÖNET</button>` : ''}</div>`;
                });
            });
        },
        mng: (t) => {
            sys.showModal(`<h4>${t}</h4><button class="btn" style="background:var(--red)" onclick="db.ref('users/${t}').update({ban:Date.now()+86400000})">24S BAN</button>
            <button class="btn" style="background:var(--green)" onclick="db.ref('users/${t}').update({ban:0})">BAN AÇ</button>`);
        },
        showDiary: () => {
            let h = "<h3>GÜNLÜK (100)</h3><div class='list-box'>";
            WORDS.forEach(w => h += `${w}, `);
            sys.showModal(h + "</div>");
        },
        showChat: () => {
            sys.showModal(`<h3>CHAT</h3><div id="cb" class="list-box" style="height:150px"></div><input id="ci"><button onclick="sys.snd()">GÖNDER</button>`);
            db.ref('chat').limitToLast(10).on('value', s => {
                let b = document.getElementById('cb'); if(b) { b.innerHTML=""; s.forEach(m=>b.innerHTML+=`<div><b>${m.val().u}:</b> ${m.val().t}</div>`); b.scrollTop=b.scrollHeight; }
            });
        },
        snd: () => { let i=document.getElementById('ci'); if(i.value){db.ref('chat').push({u:sys.uName, t:i.value}); i.value="";} },
        showVsMenu: () => sys.showModal("<h3>VS MODU</h3><p>Aktif Edildi!</p>"),
        showLeaderboard: () => {
            db.ref('users').orderByChild('record').limitToLast(10).once('value', s => {
                let h = "<h3>TOP 10</h3>";
                s.forEach(u => h += `<p>${u.key}: ${u.val().record}</p>`); sys.showModal(h);
            });
        },
        showProfile: () => sys.showModal(`<h3>${sys.uName.toUpperCase()}</h3><p>Rütbe: ${sys.role}</p>`),
        showModal: (h) => { document.getElementById('modal-content').innerHTML=h; document.getElementById('modal').style.display='flex'; },
        closeModal: () => document.getElementById('modal').style.display='none'
    };
</script>
</body>
</html>
