<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT PRO | B & H STUDIOS</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --iron: #bdc3c7; --bronze: #cd7f32; --diamond: #00d2ff;
            --purple: #9b59b6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .big-card { background: rgba(25, 25, 25, 0.95); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 30px; width: 92%; max-width: 400px; padding: 30px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative; }
        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 22px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; font-size: 14px; margin-bottom: 12px; text-align: center; outline: none; }
        
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.95); }
        
        .rank-DEVELOPER { color: var(--red); text-shadow: 0 0 15px var(--red); font-weight: 900; }
        .rank-ELİT { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
        .rank-ELMAS { color: var(--diamond); text-shadow: 0 0 10px var(--diamond); }
        .rank-ALTIN { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
        .rank-DEMİR { color: var(--iron); }
        .rank-BRONZ { color: var(--bronze); }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .list-container { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; max-height: 250px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .list-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        .hearts { font-size: 28px; color: var(--red); margin-bottom: 15px; letter-spacing: 8px; }
        .timer-text { color: var(--red); font-weight: 900; font-size: 22px; margin-top: 10px; }

        .rank-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        .rank-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: center; gap: 8px; z-index: 5000;">
    <button class="btn" style="width: auto; padding: 10px 15px; background: rgba(255,255,255,0.1); color:white; font-size: 11px;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--blue); color:white; font-size: 11px;" onclick="sys.showDiary()">📖 GÜNLÜK</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--purple); color:white; font-size: 11px;" onclick="sys.showFriends()">👥 ARKADAŞLAR</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <div style="font-family:'Orbitron'; font-weight:900; font-size:36px; color: var(--green); margin-bottom:25px; letter-spacing:3px;">WORD HUNT</div>
        <div id="login-form">
            <input type="text" id="username" placeholder="KULLANICI ADI">
            <input type="password" id="password" placeholder="ŞİFRE">
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.auth()">GİRİŞ YAP / KAYIT OL</button>
        </div>
        <div id="main-menu" style="display: none;">
            <div class="box-title" id="welcome-msg"></div>
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.openDifficulty()">🎮 OYNA</button>
            <button class="btn" style="background: var(--orange); color: white;" onclick="sys.showVsMenu()">⚔️ VS MODU</button>
            <button class="btn" style="background: var(--gold); color: black;" onclick="sys.showSuggest()">💡 ÖNERİLER</button>
            <button class="btn" style="background: var(--blue); color: white;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
            <button class="btn" style="background: #222; color: white;" onclick="location.reload()">ÇIKIŞ</button>
        </div>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card">
        <div id="hearts" class="hearts">❤️❤️❤️</div>
        <div id="word" style="font-size: 40px; font-weight: 900; margin-bottom: 25px;">...</div>
        <input type="text" id="answer" placeholder="Cevabı yaz..." autocomplete="off">
        <button class="btn" onclick="sys.checkAnswer()" style="background:var(--blue); color:white">KONTROL</button>
        <div id="timer" class="timer-text">30</div>
    </div>
</div>

<div id="modal-container" class="overlay">
    <div class="big-card">
        <div id="modal-content"></div>
        <div id="modal-actions" style="display:none; gap:10px; margin-top:20px;">
            <button id="modal-yes" class="btn" style="background:var(--green); color:black">KABUL</button>
            <button id="modal-no" class="btn" style="background:var(--red); color:white">RED</button>
        </div>
        <button id="modal-close-btn" class="btn" style="background:#333; margin-top:20px; color:white;" onclick="sys.closeModal()">KAPAT</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDQARwl0Dtelk1GBEC3HEyuPWNTPPc4Ks",
      authDomain: "bh-studios.firebaseapp.com",
      databaseURL: "https://bh-studios-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bh-studios",
      storageBucket: "bh-studios.firebasestorage.app",
      messagingSenderId: "113885803156",
      appId: "1:113885803156:web:02fc56453a263bd0e2fa81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const POOLS = {
        easy: [{tr:"Zaman",en:"time"},{tr:"Yıl",en:"year"},{tr:"İnsanlar",en:"people"},{tr:"Yol",en:"way"},{tr:"Gün",en:"day"},{tr:"Adam",en:"man"},{tr:"Şey",en:"thing"},{tr:"Kadın",en:"woman"},{tr:"Hayat",en:"life"},{tr:"Çocuk",en:"child"},{tr:"Dünya",en:"world"},{tr:"Okul",en:"school"},{tr:"Aile",en:"family"},{tr:"Öğrenci",en:"student"},{tr:"Grup",en:"group"},{tr:"El",en:"hand"},{tr:"Yer",en:"place"},{tr:"Hafta",en:"week"},{tr:"Kelime",en:"word"},{tr:"İş",en:"work"},{tr:"Kullanım",en:"use"},{tr:"Yapmak",en:"make"},{tr:"Almak",en:"take"},{tr:"Vermek",en:"give"},{tr:"Gelmek",en:"come"},{tr:"Bakmak",en:"look"},{tr:"İstemek",en:"want"},{tr:"Bulmak",en:"find"},{tr:"İyi",en:"good"},{tr:"Yeni",en:"new"},{tr:"İlk",en:"first"},{tr:"Son",en:"last"},{tr:"Uzun",en:"long"},{tr:"Harika",en:"great"},{tr:"Küçük",en:"little"},{tr:"Kendi",en:"own"},{tr:"Diğer",en:"other"},{tr:"Eski",en:"old"},{tr:"Doğru",en:"right"},{tr:"Büyük",en:"big"}],
        medium: [{tr:"Durum",en:"state"},{tr:"Ülke",en:"country"},{tr:"Sorun",en:"problem"},{tr:"Parça",en:"part"},{tr:"Vaka",en:"case"},{tr:"Şirket",en:"company"},{tr:"Sistem",en:"system"},{tr:"Söylemek",en:"tell"},{tr:"Sormak",en:"ask"},{tr:"Denemek",en:"try"},{tr:"İhtiyaç",en:"need"},{tr:"Hissetmek",en:"feel"},{tr:"Olmak",en:"become"},{tr:"Ayrılmak",en:"leave"},{tr:"Aramak",en:"call"},{tr:"Tutmak",en:"keep"},{tr:"Başlamak",en:"start"},{tr:"Görünmek",en:"seem"},{tr:"Yardım",en:"help"},{tr:"Konuşmak",en:"talk"},{tr:"Dönmek",en:"turn"},{tr:"Başlamak",en:"begin"},{tr:"Göstermek",en:"show"},{tr:"Yüksek",en:"high"},{tr:"Farklı",en:"different"},{tr:"Küçük",en:"small"},{tr:"Geniş",en:"large"},{tr:"Sıradaki",en:"next"},{tr:"Erken",en:"early"},{tr:"Genç",en:"young"},{tr:"Önemli",en:"important"},{tr:"Az",en:"few"},{tr:"Kamu",en:"public"},{tr:"Kötü",en:"bad"},{tr:"Aynı",en:"same"},{tr:"Yetenekli",en:"able"},{tr:"Çok",en:"very"},{tr:"Sık sık",en:"often"},{tr:"Gerçekten",en:"really"},{tr:"Hızlıca",en:"quickly"}],
        hard: [{tr:"Yavaşça",en:"slowly"},{tr:"İyi/Pekiyi",en:"well"},{tr:"Her zaman",en:"always"},{tr:"Bazen",en:"sometimes"},{tr:"Genellikle",en:"usually"},{tr:"Birlikte",en:"together"},{tr:"Zaten",en:"already"},{tr:"Neredeyse",en:"almost"},{tr:"Özellikle",en:"especially"},{tr:"Muhtemelen",en:"probably"},{tr:"Sonunda",en:"finally"},{tr:"Kolayca",en:"easily"},{tr:"Son zamanlarda",en:"recently"},{tr:"Hemen",en:"immediately"},{tr:"Neredeyse",en:"nearly"},{tr:"Şu anda",en:"currently"},{tr:"Açıkça",en:"clearly"},{tr:"Basitçe",en:"simply"},{tr:"Tam olarak",en:"exactly"},{tr:"Güçlüce",en:"strongly"}]
    };

    const sys = {
        name: "", score: 0, learned: [], timer: 30, active: false, lives: 3,
        isVs: false, p1Name: "", p2Name: "", p1Score: 0, p2Score: 0, vsTurn: 1,

        getRank: (s, n) => {
            if(n === 'burak') return "DEVELOPER";
            if(s >= 2000) return "ELİT"; if(s >= 1000) return "ELMAS"; if(s >= 500) return "ALTIN"; if(s >= 200) return "DEMİR"; return "BRONZ";
        },

        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return;
            db.ref('users/' + n).once('value', snap => {
                let u = snap.val();
                if(u && u.pass && u.pass !== p) return alert("Hatalı Şifre!");
                sys.name = n;
                if(!u) db.ref('users/' + n).set({ pass: p, record: 0, learned: [], friends: [] });
                sys.learned = u?.learned || [];
                document.getElementById('login-form').style.display='none';
                document.getElementById('main-menu').style.display='block';
                document.getElementById('top-bar').style.display='flex';
                let r = sys.getRank(u?.record || 0, n);
                document.getElementById('welcome-msg').innerHTML = `SELAM, <span class="rank-${r}">${n.toUpperCase()}</span>`;
                sys.listenVs();
            });
        },

        showProfile: () => {
            db.ref('users/' + sys.name).once('value', snap => {
                const u = snap.val(); const r = sys.getRank(u.record, sys.name);
                sys.showModal(`<div class="box-title">PROFİL</div>
                    <b class="rank-${r}">${sys.name.toUpperCase()} [${r}]</b><br>
                    <span>EN YÜKSEK SKOR: ${u.record}</span>
                    <table class="rank-table">
                        <tr><td><b class="rank-BRONZ">BRONZ</b></td><td>0 - 200</td></tr>
                        <tr><td><b class="rank-DEMİR">DEMİR</b></td><td>200 - 500</td></tr>
                        <tr><td><b class="rank-ALTIN">ALTIN</b></td><td>500 - 1000</td></tr>
                        <tr><td><b class="rank-ELMAS">ELMAS</b></td><td>1000 - 2000</td></tr>
                        <tr><td><b class="rank-ELİT">ELİT</b></td><td>2000+</td></tr>
                    </table>`);
            });
        },

        showFriends: () => {
            db.ref('users/' + sys.name + '/friends').once('value', snap => {
                let html = `<div class="box-title">ARKADAŞLAR</div>
                    <input id="f-name" placeholder="Arkadaş adı...">
                    <button class="btn" style="background:var(--green); color:black; font-size:11px;" onclick="sys.addFriend()">EKLE</button><div class="list-container">`;
                if(snap.exists()) {
                    snap.forEach(f => { html += `<div class="list-item"><span>${f.val().toUpperCase()}</span><button onclick="sys.sendVsReq('${f.val()}')" style="background:var(--orange); border:none; color:white; padding:6px; border-radius:8px; font-size:10px;">VS AT</button></div>`; });
                } else html += "<p style='font-size:11px;'>Henüz kimse yok.</p>";
                sys.showModal(html + `</div>`);
            });
        },

        addFriend: () => {
            const f = document.getElementById('f-name').value.trim().toLowerCase();
            if(!f || f === sys.name) return;
            db.ref('users/' + f).once('value', snap => {
                if(!snap.exists()) return alert("Kullanıcı bulunamadı!");
                db.ref('users/' + sys.name + '/friends').push(f);
                alert("Eklendi!"); sys.showFriends();
            });
        },

        listenVs: () => {
            db.ref('vs_requests/' + sys.name).on('value', snap => {
                const req = snap.val(); if(!req) return;
                sys.showConfirm(`${req.from.toUpperCase()} VS istiyor!`, () => {
                    db.ref('vs_requests/' + sys.name).remove();
                    sys.isVs = true; sys.p1Name = req.from; sys.p2Name = sys.name;
                    sys.login('medium');
                }, () => db.ref('vs_requests/' + sys.name).remove());
            });
        },

        sendVsReq: (t) => { db.ref('vs_requests/' + t).set({ from: sys.name }); alert("Davet gönderildi!"); },

        showVsMenu: () => {
            sys.showModal(`<div class="box-title">VS MODU</div>
                <button class="btn" style="background:var(--orange)" onclick="sys.showFriends()">ARKADAŞA DAVET AT</button>
                <button class="btn" style="background:var(--blue)" onclick="sys.localVs()">LOKAL VS (YAN YANA)</button>`);
        },

        localVs: () => {
            sys.showModal(`<div class="box-title">LOKAL VS</div>
                <input id="lp1" placeholder="1. OYUNCU">
                <input id="lp2" placeholder="2. OYUNCU">
                <button class="btn" style="background:var(--green); color:black" onclick="sys.startLocalVs()">BAŞLAT</button>`);
        },

        startLocalVs: () => {
            sys.p1Name = document.getElementById('lp1').value || "P1";
            sys.p2Name = document.getElementById('lp2').value || "P2";
            sys.isVs = true; sys.vsTurn = 1; sys.login('medium');
        },

        showDiary: () => {
            let html = `<div class="box-title">GÜNLÜK</div>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="btn" style="padding:8px; font-size:10px;" onclick="sys.renderDiary('easy')">KOLAY</button>
                    <button class="btn" style="padding:8px; font-size:10px;" onclick="sys.renderDiary('medium')">ORTA</button>
                    <button class="btn" style="padding:8px; font-size:10px;" onclick="sys.renderDiary('hard')">ZOR</button>
                </div>
                <div id="diary-box" class="list-container"></div>`;
            sys.showModal(html); sys.renderDiary('easy');
        },

        renderDiary: (mode) => {
            const box = document.getElementById('diary-box'); box.innerHTML = "";
            POOLS[mode].forEach(w => {
                let ok = sys.learned.includes(w.tr);
                box.innerHTML += `<div style="display:inline-block; padding:6px; margin:3px; border-radius:8px; background:rgba(255,255,255,0.05); font-size:10px; border:1px solid ${ok?'#2ecc71':'rgba(255,255,255,0.1)'}">${w.tr} ${ok?'✓':''}</div>`;
            });
        },

        showSuggest: () => {
            let html = `<div class="box-title">GLOBAL MESAJLAR</div>
                <textarea id="s-msg" placeholder="Mesaj yaz..."></textarea>
                <button class="btn" style="background:var(--gold); color:black" onclick="sys.sendS()">GÖNDER</button>
                <div id="s-list" class="list-container"></div>`;
            sys.showModal(html);
            db.ref('suggestions').limitToLast(12).on('value', snap => {
                const list = document.getElementById('s-list'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(s => { 
                    const d = s.val();
                    list.innerHTML = `<div class="list-item" style="flex-direction:column; align-items:start">
                        <b class="rank-${d.rank}">[${d.rank}] ${d.user}:</b><span>${d.msg}</span>
                    </div>` + list.innerHTML;
                });
            });
        },

        sendS: () => {
            const m = document.getElementById('s-msg').value.trim();
            if(!m) return;
            db.ref('users/'+sys.name).once('value', snap => {
                const r = sys.getRank(snap.val().record, sys.name);
                db.ref('suggestions').push({ user: sys.name.toUpperCase(), msg: m, rank: r });
                document.getElementById('s-msg').value = "";
            });
        },

        openDifficulty: () => {
            sys.showModal(`<div class="box-title">ZORLUK SEÇ</div>
                <button class="btn" style="background:var(--green)" onclick="sys.login('easy')">KOLAY</button>
                <button class="btn" style="background:var(--orange)" onclick="sys.login('medium')">ORTA</button>
                <button class="btn" style="background:var(--red)" onclick="sys.login('hard')">ZOR</button>`);
        },

        login: (l) => {
            sys.currentMode = l; sys.score = 0; sys.timer = 30; sys.lives = 3; sys.active = true;
            document.getElementById('modal-container').style.display='none';
            document.getElementById('scr-login').style.display='none';
            document.getElementById('scr-game').style.display='flex';
            sys.updateHearts(); sys.startTimer(); sys.next();
        },

        updateHearts: () => { document.getElementById('hearts').innerText = "❤️".repeat(sys.lives) + "🖤".repeat(3 - sys.lives); },

        startTimer: () => {
            let clock = setInterval(() => {
                if(!sys.active) return clearInterval(clock);
                sys.timer--; document.getElementById('timer').innerText = sys.timer;
                if(sys.timer <= 0) sys.finish();
            }, 1000);
        },

        next: () => {
            const p = POOLS[sys.currentMode];
            sys.cur = p[Math.floor(Math.random()*p.length)];
            document.getElementById('word').innerText = sys.cur.tr.toUpperCase();
            document.getElementById('answer').value = ""; document.getElementById('answer').focus();
        },

        checkAnswer: () => {
            const ans = document.getElementById('answer').value.toLowerCase().trim();
            if(ans === sys.cur.en) {
                sys.score += 50; sys.timer += 2;
                if(!sys.learned.includes(sys.cur.tr)) {
                    sys.learned.push(sys.cur.tr);
                    db.ref('users/'+sys.name).update({learned: sys.learned});
                }
                confetti({particleCount:40}); sys.next();
            } else {
                sys.lives--; sys.updateHearts();
                if(sys.lives <= 0) sys.finish(); else sys.next();
            }
        },

        finish: () => {
            sys.active = false;
            document.getElementById('scr-game').style.display = 'none';
            if(!sys.isVs) {
                db.ref('users/'+sys.name).once('value', snap => {
                    const old = snap.val().record || 0;
                    if(sys.score > old) {
                        db.ref('users/'+sys.name).update({record: sys.score}).then(() => {
                            sys.showModal(`🖤 🖤 🖤<h1 style="font-size:40px; margin:10px 0;">SON</h1><p>YENİ REKOR VE SKORUN: ${sys.score}</p>`, () => {
                                document.getElementById('scr-login').style.display='contents';
                                document.getElementById('main-menu').style.display='block';
                            });
                        });
                    } else {
                        sys.showModal(`🖤 🖤 🖤<h1 style="font-size:40px; margin:10px 0;">SON</h1><p>SKORUN: ${sys.score}</p>`, () => {
                            document.getElementById('scr-login').style.display='contents';
                            document.getElementById('main-menu').style.display='block';
                        });
                    }
                });
            } else {
                if(sys.vsTurn === 1) {
                    sys.p1Score = sys.score; sys.vsTurn = 2;
                    sys.showModal(`BİRİNCİ OYUNCU BİTTİ!<br>SIRA <b>${sys.p2Name.toUpperCase()}</b> OYUNCUSUNDA!`, () => sys.login(sys.currentMode));
                } else {
                    sys.p2Score = sys.score;
                    const win = sys.p1Score > sys.p2Score ? sys.p1Name : sys.p2Name;
                    sys.showModal(`<div class="box-title">VS BİTTİ</div><p>${sys.p1Name}: ${sys.p1Score}</p><p>${sys.p2Name}: ${sys.p2Score}</p><h2 style="color:var(--gold)">KAZANAN: ${win.toUpperCase()}</h2>`, () => {
                        document.getElementById('scr-login').style.display='contents';
                        document.getElementById('main-menu').style.display='block';
                    });
                }
            }
        },

        showModal: (h, cb) => {
            document.getElementById('modal-content').innerHTML = h;
            document.getElementById('modal-container').style.display = 'flex';
            document.getElementById('modal-actions').style.display = 'none';
            document.getElementById('modal-close-btn').style.display = 'block';
            sys.activeCallback = cb;
        },

        closeModal: () => {
            document.getElementById('modal-container').style.display='none';
            if(sys.activeCallback) {
                sys.activeCallback();
                sys.activeCallback = null;
            }
        },

        showConfirm: (msg, yes, no) => {
            sys.showModal(msg);
            document.getElementById('modal-actions').style.display = 'flex';
            document.getElementById('modal-close-btn').style.display = 'none';
            document.getElementById('modal-yes').onclick = () => { yes(); };
            document.getElementById('modal-no').onclick = () => { no(); document.getElementById('modal-container').style.display='none'; };
        },

        showLeaderboard: () => {
            db.ref('users').orderByChild('record').once('value', snap => {
                let html = `<div class="box-title">DÜNYA SIRALAMASI</div><div class="list-container">`;
                let us = []; snap.forEach(u => us.push({n:u.key, s:u.val().record || 0}));
                us.sort((a,b)=>b.s-a.s).slice(0,10).forEach((u,i) => {
                    let r = sys.getRank(u.s, u.n);
                    html += `<div class="list-item"><span>#${i+1} <b class="rank-${r}">${u.n.toUpperCase()}</b></span><b>${u.s}</b></div>`;
                });
                sys.showModal(html + `</div>`);
            });
        }
    };
    document.getElementById('answer').addEventListener('keypress', e => { if(e.key==='Enter') sys.checkAnswer(); });
</script>
</body>
