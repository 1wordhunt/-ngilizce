<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT | B & H STUDIOS</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --iron: #bdc3c7; --bronze: #cd7f32; --diamond: #00d2ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a1a, #000); color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .big-card { background: rgba(255, 255, 255, 0.07); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 25px; width: 92%; max-width: 400px; padding: 25px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 15px 50px rgba(0,0,0,0.8); position: relative; }
        .box-title { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        input, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-size: 14px; margin-bottom: 12px; text-align: center; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        
        .rank-DEVELOPER { color: var(--red); text-shadow: 0 0 15px var(--red); font-weight: 900; }
        .rank-ELİT { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
        .rank-ELMAS { color: var(--diamond); text-shadow: 0 0 10px var(--diamond); }
        .rank-ALTIN { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
        .rank-DEMİR { color: var(--iron); }
        .rank-BRONZ { color: var(--bronze); }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .word-tab { display: inline-block; padding: 10px 15px; margin: 5px; border-radius: 12px; background: rgba(255,255,255,0.05); font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
        .word-learned { border-color: var(--green); color: var(--green); background: rgba(46, 204, 113, 0.1); }
        
        .list-container { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; max-height: 250px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .list-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

        #jumpscare { position: fixed; inset: 0; z-index: 8000; display: none; align-items: center; justify-content: center; pointer-events: none; }
        .ghost-img { font-size: 180px; opacity: 0; transition: 0.5s; transform: scale(0.1); }
        #jumpscare.active { display: flex; background: rgba(255, 0, 0, 0.3); }
        #jumpscare.active .ghost-img { opacity: 1; transform: scale(1.2) rotate(10deg); }
    </style>
</head>
<body>

<audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

<div id="top-bar" style="position: fixed; top: 15px; width: 100%; display: none; justify-content: space-around; padding: 0 10px; z-index: 5000;">
    <button class="btn" style="width: auto; padding: 10px 15px; background: rgba(255,255,255,0.1); color:white;" onclick="sys.showProfile()">👤 PROFİL</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--blue); color:white;" onclick="sys.showDiary()">📖 GÜNLÜK</button>
    <button class="btn" style="width: auto; padding: 10px 15px; background: var(--gold); color:black;" onclick="sys.showSuggest()">💡 ÖNERİLER</button>
</div>

<div id="scr-login" style="display: contents;">
    <div class="big-card">
        <div style="font-family:'Orbitron'; font-weight:900; font-size:36px; color: var(--green); margin-bottom:25px;">WORD HUNT</div>
        <div id="login-form">
            <input type="text" id="username" placeholder="KULLANICI ADI">
            <input type="password" id="password" placeholder="ŞİFRE">
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.auth()">GİRİŞ YAP</button>
        </div>
        <div id="main-menu" style="display: none;">
            <div class="box-title" id="welcome-msg" style="color:var(--gold)"></div>
            <button class="btn" style="background: var(--green); color: black;" onclick="sys.openDifficulty()">🎮 TEKLİ OYNA</button>
            <button class="btn" style="background: var(--orange); color: white;" onclick="sys.show1vs1()">⚔️ DÜELLO</button>
            <button class="btn" style="background: var(--blue); color: white;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
            <button class="btn" style="background: #333; color: white;" onclick="location.reload()">ÇIKIŞ YAP</button>
        </div>
        <div id="difficulty-selection" style="display: none;">
            <div class="box-title">ZORLUK SEÇ</div>
            <button class="btn" style="background:var(--green); color: black;" onclick="sys.login('easy')">KOLAY</button>
            <button class="btn" style="background:var(--orange); color: white;" onclick="sys.login('medium')">ORTA</button>
            <button class="btn" style="background:var(--red); color: white;" onclick="sys.login('hard')">ZOR</button>
            <button class="btn" style="background:#222; color: white;" onclick="sys.backToMenu()">GERİ DÖN</button>
        </div>
        <div id="duel-setup" style="display: none;">
            <div class="box-title" style="color:var(--orange)">⚔️ DÜELLO AYARI</div>
            <input type="text" id="p1-name" placeholder="1. OYUNCU">
            <input type="text" id="p2-name" placeholder="2. OYUNCU">
            <button class="btn" style="background:var(--orange); color:white" onclick="sys.startDuelPrep()">BAŞLAT</button>
            <button class="btn" style="background:#222; color: white;" onclick="sys.backToMenu()">İPTAL</button>
        </div>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div class="big-card" style="border-color: var(--green);">
        <div id="hearts-container" style="font-size:28px; margin-bottom:15px;">❤️❤️❤️</div>
        <div style="display:flex; justify-content: space-between; font-size: 14px; margin-bottom: 20px;">
            <span id="display-name" style="color: var(--green); font-weight: 900;">...</span>
            <span>SKOR: <b id="score" style="color:var(--gold)">0</b></span>
        </div>
        <div id="duel-info" style="color:var(--orange); font-weight:900; margin-bottom:10px; display:none;">SIRA: <span id="cur-p"></span></div>
        <div id="word" style="font-size: 42px; font-weight: 900; margin: 30px 0;">...</div>
        <input type="text" id="answer" placeholder="İngilizcesini yaz..." autocomplete="off">
        <button class="btn" onclick="sys.checkAnswer()" style="background:var(--blue); color:white">KONTROL ET</button>
        <div style="font-size: 16px;">SÜRE: <span id="timer" style="color:var(--red); font-weight: 900;">30</span></div>
    </div>
</div>

<div id="modal-container" class="overlay">
    <div id="modal-box" class="big-card">
        <div id="modal-content"></div>
        <button id="modal-close-btn" class="btn" style="background:#333; margin-top:20px; color:white;">TAMAM</button>
    </div>
</div>

<div id="jumpscare"><div class="ghost-img">👻</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDQARwl0Dtelk1GBEC3HEyuPWNTPPc4Ks",
      authDomain: "bh-studios.firebaseapp.com",
      databaseURL: "https://bh-studios-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bh-studios",
      storageBucket: "bh-studios.firebasestorage.app",
      messagingSenderId: "113885803156",
      appId: "1:113885803156:web:02fc56453a263bd0e2fa81"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const POOLS = {
        easy: [
            {tr:"Zaman",en:"time"}, {tr:"Yıl",en:"year"}, {tr:"İnsanlar",en:"people"}, {tr:"Yol",en:"way/road/path"}, {tr:"Gün",en:"day"},
            {tr:"Adam",en:"man"}, {tr:"Şey",en:"thing"}, {tr:"Kadın",en:"woman"}, {tr:"Hayat",en:"life"}, {tr:"Çocuk",en:"child/kid"},
            {tr:"Dünya",en:"world"}, {tr:"Okul",en:"school"}, {tr:"Aile",en:"family"}, {tr:"Öğrenci",en:"student"}, {tr:"Grup",en:"group"},
            {tr:"El",en:"hand"}, {tr:"Parça",en:"part/piece"}, {tr:"Yer",en:"place/location"}, {tr:"Hafta",en:"week"}, {tr:"Kelime",en:"word"},
            {tr:"İş",en:"work/job"}, {tr:"Yapmak",en:"make/do"}, {tr:"Almak",en:"take/get/buy"}, {tr:"Vermek",en:"give"}, {tr:"Gelmek",en:"come"},
            {tr:"Bakmak",en:"look"}, {tr:"İstemek",en:"want"}, {tr:"Bulmak",en:"find"}, {tr:"Söylemek",en:"tell/say"}, {tr:"Sormak",en:"ask"},
            {tr:"İyi",en:"good/well"}, {tr:"Yeni",en:"new"}, {tr:"İlk",en:"first"}, {tr:"Son",en:"last/end"}, {tr:"Uzun",en:"long"}
        ],
        medium: [
            {tr:"Durum",en:"state/status/situation"}, {tr:"Ülke",en:"country"}, {tr:"Problem",en:"problem/issue"}, {tr:"Vaka",en:"case/event"}, 
            {tr:"Şirket",en:"company"}, {tr:"Sistem",en:"system"}, {tr:"Kullanmak",en:"use/utilize"}, {tr:"Denemek",en:"try/attempt"}, 
            {tr:"İhtiyaç",en:"need"}, {tr:"Hissetmek",en:"feel"}, {tr:"Ayrılmak",en:"leave/separate"}, {tr:"Aramak",en:"call/search"}, 
            {tr:"Tutmak",en:"keep/hold"}, {tr:"Başlamak",en:"start/begin"}, {tr:"Görünmek",en:"seem/appear"}, {tr:"Yardım",en:"help/aid"}, 
            {tr:"Konuşmak",en:"talk/speak"}, {tr:"Dönmek",en:"turn/return"}, {tr:"Göstermek",en:"show/display"}, {tr:"Büyük",en:"great/big/large"}, 
            {tr:"Kendi",en:"own/self"}, {tr:"Diğer",en:"other/another"}, {tr:"Eski",en:"old/ancient"}, {tr:"Doğru",en:"right/correct/true"}, 
            {tr:"Yüksek",en:"high/tall"}, {tr:"Farklı",en:"different"}, {tr:"Küçük",en:"small/little"}, {tr:"Büyük (Geniş)",en:"large"}, 
            {tr:"Sonraki",en:"next"}, {tr:"Erken",en:"early"}, {tr:"Genç",en:"young"}, {tr:"Kötü",en:"bad/evil"}, {tr:"Aynı",en:"same"},
            {tr:"Çok",en:"very/much/many"}, {tr:"Sık Sık",en:"often/frequently"}, {tr:"Birlikte",en:"together"}
        ],
        hard: [
            {tr:"Olmak",en:"become/happen"}, {tr:"Önemli",en:"important/significant"}, {tr:"Az",en:"few/little/less"}, {tr:"Kamu",en:"public"}, 
            {tr:"Yapabilmek",en:"able/can"}, {tr:"Gerçekten",en:"really/actually/truly"}, {tr:"Hızlıca",en:"quickly/fast"}, {tr:"Yavaşça",en:"slowly"}, 
            {tr:"Her zaman",en:"always/forever"}, {tr:"Bazen",en:"sometimes/occasionally"}, {tr:"Genellikle",en:"usually/generally"}, 
            {tr:"Zaten",en:"already"}, {tr:"Neredeyse",en:"almost/nearly"}, {tr:"Özellikle",en:"especially/particularly"}, 
            {tr:"Muhtemelen",en:"probably/maybe"}, {tr:"Sonunda",en:"finally/eventually"}, {tr:"Kolayca",en:"easily"}, 
            {tr:"Son zamanlarda",en:"recently/lately"}, {tr:"Hemen",en:"immediately/now"}, {tr:"Şu anda",en:"currently/now/presently"}, 
            {tr:"Açıkça",en:"clearly/obviously"}, {tr:"Basitçe",en:"simply"}, {tr:"Tam olarak",en:"exactly/precisely"}, {tr:"Güçlüce",en:"strongly"}
        ]
    };

    const sys = {
        name: "", score: 0, time: 30, active: false, hearts: 3, learned: [], cur: null, currentMode: 'easy',
        isDuel: false, p1N: "", p2N: "", p1S: 0, p2S: 0, duelTurn: 1,
        
        getRank: (s, n) => {
            if(n === 'burak') return "DEVELOPER";
            if(s >= 20000) return "ELİT"; if(s >= 15000) return "ELMAS"; if(s >= 10000) return "ALTIN"; if(s >= 5000) return "DEMİR"; return "BRONZ";
        },

        auth: () => {
            const n = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!n || !p) return;
            db.ref('users/' + n).once('value', snap => {
                let u = snap.val();
                if(u && u.pass !== p) return sys.showModal(`<div class="box-title" style="color:var(--red)">HATA!</div><p>Şifre Yanlış Kanka.</p>`);
                sys.name = n;
                if(!u) db.ref('users/' + n).set({ pass: p, record: 0, learned: [] });
                sys.learned = u?.learned || [];
                document.getElementById('login-form').style.display='none';
                document.getElementById('main-menu').style.display='block';
                document.getElementById('top-bar').style.display='flex';
                document.getElementById('welcome-msg').innerText = "SELAM, " + n.toUpperCase();
            });
        },

        openDifficulty: () => { document.getElementById('main-menu').style.display='none'; document.getElementById('difficulty-selection').style.display='block'; },
        show1vs1: () => { document.getElementById('main-menu').style.display='none'; document.getElementById('duel-setup').style.display='block'; sys.isDuel = true; },
        startDuelPrep: () => { sys.p1N = document.getElementById('p1-name').value || "P1"; sys.p2N = document.getElementById('p2-name').value || "P2"; sys.name = sys.p1N; sys.openDifficulty(); },
        
        login: (l) => {
            sys.currentMode = l; sys.hearts = 3; sys.score = 0; sys.time = 30;
            document.getElementById('difficulty-selection').style.display='none';
            document.getElementById('scr-game').style.display='flex';
            document.getElementById('display-name').innerText = sys.name.toUpperCase();
            document.getElementById('score').innerText = "0";
            if(sys.isDuel) { document.getElementById('duel-info').style.display='block'; document.getElementById('cur-p').innerText = sys.name.toUpperCase(); }
            sys.updateHearts(); sys.start();
        },

        start: () => {
            sys.active = true; sys.next();
            let clock = setInterval(() => {
                if(!sys.active) return clearInterval(clock);
                sys.time--; document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) { sys.active = false; sys.finish(); }
            }, 1000);
        },

        updateHearts: () => { document.getElementById('hearts-container').innerText = "❤️".repeat(sys.hearts) + "🖤".repeat(3-sys.hearts); },

        next: () => {
            const pool = POOLS[sys.currentMode];
            sys.cur = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('word').innerText = sys.cur.tr.toUpperCase();
            document.getElementById('answer').value = ""; document.getElementById('answer').focus();
        },

        checkAnswer: () => {
            let userAns = document.getElementById('answer').value.toLowerCase().trim();
            let corrects = sys.cur.en.toLowerCase().split('/');
            if(corrects.includes(userAns)) {
                sys.score += 50; sys.time += 3; document.getElementById('score').innerText = sys.score;
                document.getElementById('snd-success').play(); confetti({ particleCount: 40, spread: 70, origin: { y: 0.6 } });
                if(!sys.learned.includes(sys.cur.tr)) { sys.learned.push(sys.cur.tr); db.ref('users/' + (sys.isDuel ? sys.name : sys.name)).update({ learned: sys.learned }); }
                sys.next();
            } else {
                sys.hearts--; sys.updateHearts(); document.getElementById('snd-error').play();
                const js = document.getElementById('jumpscare'); js.style.display='flex'; setTimeout(() => js.classList.add('active'), 10);
                setTimeout(() => { js.classList.remove('active'); js.style.display='none'; }, 500);
                if(sys.hearts <= 0) { sys.active = false; sys.finish(); } else { sys.next(); }
            }
        },

        finish: () => {
            sys.active = false;
            document.getElementById('scr-game').style.display = 'none';
            if(!sys.isDuel) {
                db.ref('users/' + sys.name).once('value', snap => {
                    let oldR = snap.val()?.record || 0;
                    if(sys.score > oldR) {
                        db.ref('users/' + sys.name).update({ record: sys.score });
                    }
                    sys.showModal(`<div class="box-title" style="color:var(--red)">Oyun Bitti!</div><h1 style="font-size:50px">${sys.score}</h1><p>SKORUN SIRALAMAYA İŞLENDİ</p>`, () => sys.backToMenu());
                });
            } else {
                if(sys.duelTurn === 1) { 
                    sys.p1S = sys.score; sys.duelTurn = 2; sys.name = sys.p2N; 
                    sys.showModal(`<div class="box-title">${sys.p1N} BİTİRDİ!</div><h2>Sıra: ${sys.p2N}</h2>`, () => sys.login(sys.currentMode)); 
                } else { 
                    sys.p2S = sys.score; 
                    let winner = sys.p1S > sys.p2S ? sys.p1N : (sys.p2S > sys.p1S ? sys.p2N : "BERABERE");
                    sys.showModal(`<div class="box-title" style="color:var(--gold)">KAZANAN: ${winner.toUpperCase()}</div><p>${sys.p1N}: ${sys.p1S} VS ${sys.p2N}: ${sys.p2S}</p>`, () => location.reload());
                }
            }
        },

        showModal: (html, callback) => {
            const m = document.getElementById('modal-container');
            const c = document.getElementById('modal-content');
            const b = document.getElementById('modal-close-btn');
            c.innerHTML = html; m.style.display = 'flex';
            b.onclick = () => { 
                m.style.display='none'; 
                if(callback) callback(); 
            };
        },

        showLeaderboard: () => {
            db.ref('users').orderByChild('record').once('value', snap => {
                let html = `<div class="box-title">🏆 DÜNYA SIRALAMASI</div><div class="list-container">`;
                let users = [];
                snap.forEach(u => {
                    users.push({ n: u.key, s: u.val().record || 0 });
                });
                users.sort((a, b) => b.s - a.s);
                users.slice(0, 20).forEach((x, i) => {
                    let r = sys.getRank(x.s, x.n);
                    html += `<div class="list-item"><span>#${i+1} ${x.n.toUpperCase()}</span><span class="rank-${r}">${r} (${x.s})</span></div>`;
                });
                sys.showModal(html + `</div>`);
            });
        },

        showSuggest: () => {
            let html = `<div class="box-title">💡 ÖNERİLER</div>
                        <textarea id="s-msg" placeholder="Mesajını yaz..."></textarea>
                        <button class="btn" style="background:var(--gold); color:black;" onclick="sys.sendS()">GÖNDER</button>
                        <div id="s-list" class="list-container">Yükleniyor...</div>`;
            sys.showModal(html);
            db.ref('suggestions').limitToLast(10).on('value', snap => {
                const list = document.getElementById('s-list'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(s => {
                    let d = s.val();
                    list.innerHTML = `<div class="list-item" style="flex-direction:column; align-items:flex-start;">
                                        <b class="rank-${d.rank}">${d.rank} | ${d.user}:</b>
                                        <span>${d.msg}</span>
                                      </div>` + list.innerHTML;
                });
            });
        },

        sendS: () => {
            const msg = document.getElementById('s-msg').value.trim();
            if(!msg) return;
            db.ref('users/' + sys.name).once('value', snap => {
                let r = sys.getRank(snap.val()?.record || 0, sys.name);
                db.ref('suggestions').push({ user: sys.name.toUpperCase(), rank: r, msg: msg });
                document.getElementById('s-msg').value = "";
            });
        },

        showDiary: () => {
            let html = `<div class="box-title">📖 GÜNLÜK</div><div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn" style="background:var(--green); font-size:10px; padding:8px" onclick="sys.loadD('easy')">KOLAY</button>
                <button class="btn" style="background:var(--orange); font-size:10px; padding:8px" onclick="sys.loadD('medium')">ORTA</button>
                <button class="btn" style="background:var(--red); font-size:10px; padding:8px" onclick="sys.loadD('hard')">ZOR</button>
            </div><div id="d-cont" class="list-container"></div>`;
            sys.showModal(html); sys.loadD('easy');
        },

        loadD: (m) => {
            const cont = document.getElementById('d-cont'); cont.innerHTML = "";
            POOLS[m].forEach(w => {
                let ok = sys.learned.includes(w.tr);
                cont.innerHTML += `<div class="word-tab ${ok?'word-learned':''}">${w.tr} ${ok?'✅':''}</div>`;
            });
        },

        showProfile: () => {
            db.ref('users/' + sys.name).once('value', snap => {
                const u = snap.val(); const r = sys.getRank(u.record, sys.name);
                sys.showModal(`<div class="box-title">👤 PROFİL</div>
                               <div class="list-item"><span>OYUNCU:</span><b>${sys.name.toUpperCase()}</b></div>
                               <div class="list-item"><span>REKOR:</span><b style="color:var(--gold)">${u.record}</b></div>
                               <div class="list-item"><span>RÜTBE:</span><b class="rank-${r}">${r}</b></div>`);
            });
        },

        backToMenu: () => { 
            document.getElementById('difficulty-selection').style.display='none'; 
            document.getElementById('duel-setup').style.display='none'; 
            document.getElementById('main-menu').style.display='block'; 
            sys.isDuel = false; 
            sys.duelTurn = 1;
        }
    };

    document.getElementById('answer').addEventListener('keypress', e => { if(e.key === 'Enter') sys.checkAnswer(); });
</script>
</body>
</html>
