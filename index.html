<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD HUNT HORROR | DEV BURAK</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --green: #2ecc71; --red: #ff4757; --orange: #e67e22; --blue: #3498db; 
            --gold: #f1c40f; --dark: #050505; --card: #111;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }
        
        /* Kart Tasarımı */
        .big-card { background: var(--card); border-radius: 20px; width: 95%; max-width: 450px; padding: 25px; text-align: center; border: 1px solid #222; margin: auto; box-shadow: 0 0 30px rgba(255,0,0,0.1); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; color: #fff; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn:active { transform: scale(0.95); }
        
        /* Jumpscare & Shake Efekti */
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 100% { transform: translate(1px, 1px) rotate(0deg); } }
        .jumpscare-overlay { position: fixed; inset: 0; background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6MHg5ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKv9QWGb7y3jPj2/giphy.gif') center/cover; z-index: 9999; display: none; opacity: 0.3; pointer-events: none; }
        .shake { animation: shake 0.3s; }

        .overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        
        /* Özel Sıralama Tablosu */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-family: 'Orbitron'; }
        .rank-table tr { border-bottom: 1px solid #222; }
        .rank-table td { padding: 12px; font-size: 13px; }
        .top-1 { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* Global Chat */
        #chat-area { height: 150px; overflow-y: auto; background: #080808; border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; font-size: 12px; border: 1px solid #222; }
        .chat-msg b { color: var(--blue); }
        .dev-msg b { color: var(--red) !important; text-shadow: 0 0 5px var(--red); }
    </style>
</head>
<body>

<div id="js-trigger" class="jumpscare-overlay"></div>

<div id="main-menu" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
    <div class="big-card">
        <h1 style="font-family:'Orbitron'; color: var(--red); margin-bottom: 20px; letter-spacing: 5px;">WORD HUNT</h1>
        <div id="user-info" style="margin-bottom: 20px;"></div>
        <button class="btn" style="background: var(--red);" onclick="sys.openModal('modal-diff')">🎮 OYNA</button>
        <button class="btn" style="background: var(--blue);" onclick="sys.openModal('modal-diary')">📖 GÜNLÜK</button>
        <button class="btn" style="background: #222;" onclick="sys.showLeaderboard()">🏆 SIRALAMA</button>
        <button class="btn" style="background: #444;" onclick="sys.openModal('modal-chat')">💬 GLOBAL CHAT</button>
    </div>
</div>

<div id="modal-diff" class="overlay">
    <div class="big-card">
        <h2 style="font-family:'Orbitron'; margin-bottom: 20px;">ZORLUK SEÇ</h2>
        <button class="btn" style="background: var(--green);" onclick="sys.startGame('easy')">KOLAY</button>
        <button class="btn" style="background: var(--orange);" onclick="sys.startGame('medium')">ORTA</button>
        <button class="btn" style="background: var(--red);" onclick="sys.startGame('hard')">ZOR</button>
        <button class="btn" style="background: #333;" onclick="sys.closeModals()">GERİ</button>
    </div>
</div>

<div id="modal-diary" class="overlay">
    <div class="big-card">
        <h2 style="font-family:'Orbitron'; margin-bottom: 15px;">KELİMELERİM</h2>
        <div id="diary-list" style="max-height: 300px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
        <button class="btn" style="background: #333; margin-top: 15px;" onclick="sys.closeModals()">KAPAT</button>
    </div>
</div>

<div id="modal-rank" class="overlay">
    <div class="big-card">
        <h2 style="font-family:'Orbitron';">🏆 LİDERLER</h2>
        <table class="rank-table" id="rank-content"></table>
        <button class="btn" style="background: #333; margin-top: 15px;" onclick="sys.closeModals()">KAPAT</button>
    </div>
</div>

<div id="scr-game" class="overlay">
    <div id="game-card" class="big-card">
        <div id="timer" style="font-size: 40px; color: var(--red); font-family: 'Orbitron';">30</div>
        <div id="target-word" style="font-size: 38px; margin: 20px 0; font-weight: 900;">...</div>
        <input type="text" id="answer-input" placeholder="İngilizcesini Yaz..." style="width:100%; padding:15px; background:#000; border:2px solid #333; color:#fff; border-radius:10px; text-align:center; font-size:18px; margin-bottom:15px;">
        <button class="btn" style="background: var(--blue);" onclick="sys.check()">KONTROL ET</button>
        <div id="game-score" style="color:var(--gold); font-weight:800;">PUAN: 0</div>
    </div>
</div>

<div id="modal-chat" class="overlay">
    <div class="big-card">
        <h2 style="font-family:'Orbitron'; margin-bottom:10px;">GLOBAL CHAT</h2>
        <div id="chat-area"></div>
        <input type="text" id="chat-input" placeholder="Mesaj..." style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:5px; margin-bottom:10px;">
        <button class="btn" style="background: var(--blue);" onclick="sys.sendChat()">GÖNDER</button>
        <button class="btn" style="background: #333;" onclick="sys.closeModals()">KAPAT</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA-rMw-MeHpSq0Zh4RX52Ct6DTXec9xCUM",
        authDomain: "ing-9dee1.firebaseapp.com",
        databaseURL: "https://ing-9dee1-default-rtdb.firebaseio.com",
        projectId: "ing-9dee1",
        storageBucket: "ing-9dee1.firebasestorage.app",
        messagingSenderId: "701609740939",
        appId: "1:701609740939:web:d13eded0401d2305da228e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 100 Kelime (Basitleştirilmiş Dağılım)
    const WORDS = {
        easy: [{t:"Zaman",e:"time"}, {t:"Yıl",e:"year"}, {t:"Yol",e:"way"}, {t:"Gün",e:"day"}, {t:"Okul",e:"school"}],
        medium: [{t:"Sistem",e:"system"}, {t:"Aile",e:"family"}, {t:"Şirket",e:"company"}, {t:"Sormak",e:"ask"}],
        hard: [{t:"Özellikle",e:"especially"}, {t:"Tam olarak",e:"exactly"}, {t:"Şu anda",e:"currently"}]
    };

    const sys = {
        name: "Burak", record: 1250, score: 0, time: 30, curW: null, knows: {},
        
        startGame: (diff) => {
            sys.closeModals();
            sys.score = 0; sys.time = 30;
            document.getElementById('scr-game').style.display = 'flex';
            sys.next(diff);
            sys.timerObj = setInterval(() => {
                sys.time--;
                document.getElementById('timer').innerText = sys.time;
                if(sys.time <= 0) sys.end();
            }, 1000);
        },

        next: (diff) => {
            const pool = WORDS[diff];
            sys.curW = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('target-word').innerText = sys.curW.t;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        },

        check: () => {
            const inp = document.getElementById('answer-input').value.trim().toLowerCase();
            const card = document.getElementById('game-card');
            if(inp === sys.curW.e) {
                sys.score += 50; sys.time += 2;
                document.getElementById('game-score').innerText = "PUAN: " + sys.score;
                confetti({particleCount: 60, spread: 70, origin: { y: 0.6 }});
                sys.next('easy'); // Örnek olarak easy devam eder
            } else {
                // JUMPSCARE & SHAKE
                document.getElementById('js-trigger').style.display = 'block';
                card.classList.add('shake');
                setTimeout(() => {
                    document.getElementById('js-trigger').style.display = 'none';
                    card.classList.remove('shake');
                }, 400);
            }
        },

        showLeaderboard: () => {
            sys.openModal('modal-rank');
            db.ref('users').orderByChild('record').limitToLast(10).once('value', snap => {
                const table = document.getElementById('rank-content');
                table.innerHTML = "";
                let arr = [];
                snap.forEach(u => arr.push({n: u.key, s: u.val().record}));
                arr.reverse().forEach((u, i) => {
                    const cls = i === 0 ? 'top-1' : '';
                    table.innerHTML += `<tr class="${cls}"><td>#${i+1}</td><td>${u.n.toUpperCase()}</td><td>${u.s} PT</td></tr>`;
                });
            });
        },

        sendChat: () => {
            const m = document.getElementById('chat-input').value;
            if(!m) return;
            db.ref('chat').push({u: sys.name, m: m, dev: true});
            document.getElementById('chat-input').value = "";
        },

        openModal: (id) => { 
            sys.closeModals();
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'modal-diary') sys.loadDiary();
        },

        loadDiary: () => {
            const list = document.getElementById('diary-list');
            list.innerHTML = "";
            // Örnek kelimeler
            WORDS.easy.forEach(w => {
                list.innerHTML += `<div style="background:#222; padding:10px; border-radius:5px; font-size:12px;">${w.e} ✓</div>`;
            });
        },

        closeModals: () => document.querySelectorAll('.overlay').forEach(o => o.style.display='none'),
        end: () => { clearInterval(sys.timerObj); alert("OYUN BİTTİ!"); location.reload(); }
    };

    // Chat İzleme
    db.ref('chat').limitToLast(15).on('value', snap => {
        const area = document.getElementById('chat-area');
        area.innerHTML = "";
        snap.forEach(c => {
            const msg = c.val();
            const cls = msg.dev ? 'dev-msg' : '';
            area.innerHTML += `<div class="chat-msg ${cls}"><b>${msg.u}:</b> ${msg.m}</div>`;
        });
        area.scrollTop = area.scrollHeight;
    });
</script>
</body>
</html>
